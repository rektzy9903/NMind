<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cg-clip">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cg-clip)">
    <!-- Background — pure black -->
    <rect width="120" height="120" fill="#000000"/>

    <!-- Diagonal accent lines from inner corners to center — faint white -->
    <line x1="20" y1="20" x2="60" y2="60" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.14"/>
    <line x1="100" y1="20" x2="60" y2="60" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.14"/>
    <line x1="20" y1="100" x2="60" y2="60" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.14"/>
    <line x1="100" y1="100" x2="60" y2="60" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.14"/>

    <!-- Cardinal "paths" through the diamond tips to center — one hue each
         (top cyan, right rose, bottom amber, left emerald). -->
    <line x1="60" y1="10" x2="60" y2="60" stroke="#00D4FF" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="110" y1="60" x2="60" y2="60" stroke="#FF4D6D" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="60" y1="110" x2="60" y2="60" stroke="#FF8C42" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="10" y1="60" x2="60" y2="60" stroke="#10FFAB" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>

    <!-- Diamond "door" outline — frosted white -->
    <polygon points="60,12 108,60 60,108 12,60"
      fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linejoin="round" opacity="0.62"/>

    <!-- Tip dots at diamond vertices — one hue each (r=4) -->
    <circle cx="60" cy="12"  r="4" fill="#00D4FF"/>
    <circle cx="108" cy="60" r="4" fill="#FF4D6D"/>
    <circle cx="60" cy="108" r="4" fill="#FF8C42"/>
    <circle cx="12" cy="60"  r="4" fill="#10FFAB"/>

    <!-- Center glow halo — amber core (r=10) -->
    <circle cx="60" cy="60" r="10" fill="#FF8C42" opacity="0.15"/>

    <!-- Center node solid — the "one door" (r=6) -->
    <circle cx="60" cy="60" r="6" fill="#FF8C42"/>
  </g>
</svg>
