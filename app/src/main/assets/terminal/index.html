imgPreviewEl.addEventListener('click', function() {

// ── Input buffer ──────────────────────────────────────────────────────────────
let inputBuffer='';

function updateInputDisp(){
  inputDisp.textContent=inputBuffer;
  scrollToBottom();
}

// Strip Android IME artifacts so they don't break !command / $cmd matching:
//  (a) invisible chars the soft keyboard slips in — zero-width joiners, bidi
//      direction marks, soft-hyphen, line/paragraph separators (a hidden char
//      inside "!clear" makes it !== "!clear" → command silently ignored);
//  (b) fullwidth punctuation (！ ＄ from CJK / smart-punctuation modes) → ASCII.
// Shared by submitLine (Send button) AND sendRawInput (keyboard Enter) so both
// input paths normalize identically. Engine-independent (Android IME quirk, not
// a claude-code/engine thing) — keep regardless of backend.
function stripImeArtifacts(s){
  return (s||'')
    .replace(/[\u200b-\u200f\u2028\u2029\u202a-\u202e\u2060-\u206f\ufeff\u00ad]/g,'')
    .replace(/！/g,'!')   // fullwidth ！ → ASCII !
    .replace(/＄/g,'$');  // fullwidth ＄ → ASCII $
}

function submitLine(text){
  // Normalize BEFORE routing (see stripImeArtifacts) so ! and $ commands don't
  // slip through to the AI instead of the bridge.
  let msg=stripImeArtifacts(text!==undefined?text:inputBuffer).trim();
  if(/^!\s+/.test(msg)) msg='!'+msg.slice(1).trimStart(); // "! cmd" → "!cmd"
  inputBuffer='';
  ghost.value='';
  historyIdx=-1;
  savedInput='';
  updateInputDisp();
  if(!msg && !pendingImageAttached) return;
  // Local bridge commands (!log, !help, !clear, $ cmd, etc.): show a terminal
  // command bubble so the user sees what was typed, then send as raw input.
  // No thinking spinner, no AI bubble — bridge handles these directly.
  if(msg.startsWith('!')||msg.startsWith('$')){
    if(msg.length>0&&inputHistory[inputHistory.length-1]!==msg){
      inputHistory.push(msg);
      if(inputHistory.length>50) inputHistory.shift();
    }
    // All ! and $ commands run immediately regardless of busy state
    // Fresh sys bubble so bridge output appears below this cmd bubble
    resetSysBubble(true);
    addCmdBubble(msg,false);
    // Normalize ! command verb to lowercase before sending — Android autocorrect
    // treats "!" as sentence-end and capitalizes the next character, breaking
    // bridge's command matching. Only lowercase the verb, not $ shell args.
    let toSend=msg;
    if(msg.startsWith('!')){
      const sp=msg.indexOf(' ');
      toSend=(sp===-1?msg:msg.slice(0,sp)).toLowerCase()+(sp===-1?'':msg.slice(sp));
    }
    if(typeof Android!=='undefined') Android.sendInput(toSend+'\r');
    return;
  }
  // Image-only send: empty text — addUserBubble below handles the no-text +
  // thumbnail case (the thumb already conveys "image attached").
  const displayMsg = msg;
  // Push to input history (skip empty image-only sends + duplicates)
  if(msg.length>0 && inputHistory[inputHistory.length-1]!==msg){
    inputHistory.push(msg);
    if(inputHistory.length>50) inputHistory.shift();
  }
  resetToIdle(); // finalize any pending AI bubble and hide thinking animation
  resetSysBubble(true);
  // Remove suggestions bar if present
  const sb=document.getElementById('suggestions-bar');if(sb)sb.remove();
  if(pendingImageAttached){
    const thumbUrl = pendingImageDataUrl;
    pendingImageAttached = false;
    pendingImageDataUrl  = null;
    _hideImgPreview();
    addUserBubble(displayMsg, thumbUrl);
    if(typeof Android!=='undefined') Android.submitMessageWithImage(msg);
  } else {
    addUserBubble(displayMsg);
    if(typeof Android!=='undefined') Android.submitMessage(msg);
  }
}

// ── Input textarea (F6) ───────────────────────────────────────────────────────
// Was the offscreen "ghost" textarea — now a real visible textarea inside
// #input-wrap. The fake #input-display span + #cursor stay in the DOM (hidden)
// so existing code paths that call updateInputDisp() remain harmless no-ops.
// The variable name `ghost` is kept for backward-compat with all call sites.
const ghost=document.createElement('textarea');
ghost.id='input-textarea';
ghost.rows=1;
ghost.style.cssText='display:block;width:100%;min-height:22px;max-height:160px;background:transparent;color:#f1f5f9;font-family:Space Mono,Courier New,monospace;font-size:13px;line-height:1.5;padding:0;margin:0;border:none;outline:none;resize:none;caret-color:#E8834A;word-break:break-all;overflow-wrap:anywhere;overflow-y:auto;';
ghost.setAttribute('autocomplete','off');
ghost.setAttribute('autocorrect','off');
ghost.setAttribute('autocapitalize','none');
ghost.setAttribute('spellcheck','false');
ghost.setAttribute('enterkeyhint','send');
inputWrap.appendChild(ghost);
// Hide the legacy span+cursor — textarea now renders its own text natively.
if(inputDisp) inputDisp.style.display='none';
var _legacyCursor=document.getElementById('cursor');
if(_legacyCursor) _legacyCursor.style.display='none';

// M16: store timer ID so we can clearTimeout before each new focus scroll.
let ghostScrollTimer = null;
ghost.addEventListener('focus',function(){
  toolbarOpen=true;
  updateLayout();
  clearTimeout(ghostScrollTimer);
  ghostScrollTimer = setTimeout(scrollToBottom,50);
});
ghost.addEventListener('blur',function(){
  setTimeout(function(){
    if(document.activeElement!==ghost){
      toolbarOpen=false;
      updateLayout();
    }
  },200);
});
// Send inputBuffer (or empty string) directly to PTY without the chat-message
// path. This avoids addUserBubble + resetToIdle which cause misalignment when
// interacting with Claude Code's TUI menus (theme picker, prompts, etc.).
// The send button (→) still uses submitLine() for proper chat message behavior.
function sendRawInput(){
  // Strip Android IME artifacts (see stripImeArtifacts), same as submitLine.
  const text=stripImeArtifacts(inputBuffer).trim();
  inputBuffer='';ghost.value='';historyIdx=-1;savedInput='';
  updateInputDisp();
  if(text.length>0){
    if(inputHistory[inputHistory.length-1]!==text){
      inputHistory.push(text);if(inputHistory.length>50)inputHistory.shift();
    }
    // Normalize ! command verb to lowercase so keyboard-Enter path matches bridge
    // handlers the same way the Send button path does.
    let toSend=text;
    if(text.startsWith('!')){
      const sp=text.indexOf(' ');
      toSend=(sp===-1?text:text.slice(0,sp)).toLowerCase()+(sp===-1?'':text.slice(sp));
    }
    tbRaw(toSend+'\r');
  } else {
    tbRaw('\r');
  }
}
// M10: track whether the last input was a paste so we don't strip newlines from it.
var _ghostLastWasPaste = false;
ghost.addEventListener('paste', function(){
  _ghostLastWasPaste = true;
});
ghost.addEventListener('input',function(){
  const val=ghost.value;
  if(val.includes('\n')){
    if(_ghostLastWasPaste){
      // Paste: allow multi-line — keep newlines in the buffer, do not trigger send.
      _ghostLastWasPaste=false;
      inputBuffer=val;
      ghost.value=val;
      updateInputDisp();
      return;
    }
    // Enter key: strip the newline and send.
    ghost.value=val.replace(/\n/g,'');
    inputBuffer=ghost.value;
    updateInputDisp();
    sendRawInput();
    return;
  }
  _ghostLastWasPaste=false;
  inputBuffer=val;
  updateInputDisp();
});
ghost.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();sendRawInput();}
  else if(e.key==='ArrowUp'){e.preventDefault();if(inputBuffer.length===0){tbRaw('\x1b[A');}else{historyUp();}}
  else if(e.key==='ArrowDown'){e.preventDefault();if(historyIdx===-1){tbRaw('\x1b[B');}else{historyDown();}}
  // F6: when textarea has text, let arrow keys move the native caret for editing.
  // Only forward cursor escapes to the bridge when the buffer is empty (terminal nav).
  else if(e.key==='ArrowLeft'){if(inputBuffer.length===0){e.preventDefault();tbRaw('\x1b[D');}}
  else if(e.key==='ArrowRight'){if(inputBuffer.length===0){e.preventDefault();tbRaw('\x1b[C');}}
  else if(e.key==='Tab'){e.preventDefault();tbRaw('\t');}
  else if(e.key==='Escape'){e.preventDefault();tbRaw('\x1b');}
  // F6: let the textarea handle Backspace natively when there's text — the input
  // event will sync inputBuffer. Only forward raw DEL when buffer is empty.
  else if(e.key==='Backspace'){
    if(inputBuffer.length===0){e.preventDefault();tbRaw('\x7f');}
  }
});

// Ctrl is now a glowing modifier (chord), not a one-tap ^C. Armed state + glow are

// The TAP itself blurs the active input (xterm's hidden textarea in Ubuntu mode, the

// Chat has no live TTY, so only Ctrl+C is meaningful (cancel the spawn); any letter

});
// Terminal keys (Esc/Tab/|/←/→) — Ubuntu only (locked+grey in Nexus, so these never
// fire there). Delegated off #toolbar; route the mapped sequence to the PTY.
(function(){
  var TB_KEYMAP={esc:'\x1b', tab:'\t', pipe:'|', left:'\x1b[D', right:'\x1b[C'};
  var bar=document.getElementById('toolbar');
  if(bar) bar.addEventListener('click', function(e){
    var b=e.target.closest('button[data-key]'); if(!b) return;

})();
// Lock (grey + disable) the buttons that don't apply to the active tab.
window.updateToolbarMode = function(ub){
  var bar=document.getElementById('toolbar'); if(!bar) return;

  for(var i=0;i<btns.length;i++){

// Initialise to chat mode locks on load.
try { window.updateToolbarMode(false); } catch(_){}

// ── Font size ─────────────────────────────────────────────────────────────────
// M9: parse, validate and clamp on load; NaN or out-of-range falls back to 14.
var termFontSize=Math.max(10,Math.min(22,parseInt(localStorage.getItem('termFontSize'))||14));
function applyFontSize(sz){
  termFontSize=Math.max(10,Math.min(22,sz));
  localStorage.setItem('termFontSize',String(termFontSize));
  msgs.style.fontSize=termFontSize+'px';
  // Chat bubbles + markdown have their own fixed px sizes that override the
  // container font-size, so the inherited size alone does nothing. Drive them
  // all off a single scale var (--cfs); 14 = default → scale 1.0 (no change).
  msgs.style.setProperty('--cfs', (termFontSize/14).toFixed(3));
  reportTermSize();
}
applyFontSize(termFontSize);

// ── Terminal size reporting ────────────────────────────────────────────────────
// Measures the character grid and notifies Kotlin (COLS/ROWS). The !pty TTY
// consumer was removed; this is kept for the ANSI render-width awareness and is
// harmless if unused.
function reportTermSize(){
  var probe=document.createElement('span');
  probe.style.cssText='position:absolute;visibility:hidden;font-family:Space Mono,Courier New,monospace;font-size:'+termFontSize+'px;white-space:pre;';
  probe.textContent='X';
  document.body.appendChild(probe);
  var r=probe.getBoundingClientRect();
  var charW=r.width||8;
  var charH=r.height||termFontSize*1.5;
  document.body.removeChild(probe);
  var cols=Math.max(40,Math.floor(window.innerWidth/charW));
  var rows=Math.max(10,Math.floor(window.innerHeight/charH));
  // L20: wrap in try/catch — WebView bridge can throw if called before binding is ready.
  if(typeof Android!=='undefined'&&Android.notifyResize){
    try { Android.notifyResize(cols,rows); } catch(_) {}
  }
}
window.addEventListener('resize',reportTermSize);
// Refocus the ACTIVE input by mode (ghost is the chat input — focusing it in Ubuntu
// mode was wrong and could itself pop/dismiss the keyboard). Belt-and-suspenders with
// the toolbar mousedown-preventDefault above.
function refocusActiveInput(){ if(window.__nexusMode==='ubuntu'){ if(window.__focusTerm) window.__focusTerm(); } else { try{ghost.focus();}catch(_){} } }
document.getElementById('btn-font-dec').addEventListener('click',function(){applyFontSize(termFontSize-1);if(window.adjustXtermFont)window.adjustXtermFont(-1);refocusActiveInput();});
document.getElementById('btn-font-inc').addEventListener('click',function(){applyFontSize(termFontSize+1);if(window.adjustXtermFont)window.adjustXtermFont(1);refocusActiveInput();});

// ── MCP chip tap — show/hide tool popover ─────────────────────────────────────
document.getElementById('mcp-chip').addEventListener('click',function(){
  var pop=document.getElementById('mcp-popover');
  if(!pop) return;
  if(pop.style.display==='block'){pop.style.display='none';return;}
  var data=this._mcpData||[];
  // MCP-4: header now reflects connected/total counts
  var ok=data.filter(function(s){return s.status!=='failed';}).length;
  var html='<div style="font-size:9px;color:rgba(0,200,100,0.6);letter-spacing:1px;margin-bottom:6px;">MCP SERVERS — '+ok+'/'+data.length+' CONNECTED</div>';
  if(!data.length){html+='<div style="color:rgba(200,200,200,0.4);">None</div>';}
  for(var i=0;i<data.length;i++){
    var srv=data[i];
    // MCP-1 made HTTP work in both modes via the stdio shim, so both types
    // are "chat + agentic" now — the old "agentic only" label is stale.
    var typeLabel=srv.type||'http';
    var failed=srv.status==='failed';
    var bullet=failed?'✗':'●';
    html+='<div class="mcp-server-hd'+(failed?' failed':'')+'">'+bullet+' '+srv.name
      +' <span style="color:rgba(200,200,200,0.35);font-size:8px;">('+typeLabel+')</span></div>';
    if(failed){
      var err=(srv.error||'connection failed').toString().slice(0,160);
      html+='<div class="mcp-fail-row">'+err.replace(/[<>&]/g,function(c){return c==='<'?'&lt;':c==='>'?'&gt;':'&amp;';})+'</div>';
    } else if(srv.tools&&srv.tools.length){
      for(var j=0;j<srv.tools.length;j++){
        html+='<div class="mcp-tool-row">· '+srv.tools[j].name+'</div>';
      }
    }else{
      html+='<div class="mcp-tool-row" style="color:rgba(200,200,200,0.35);">(no tools)</div>';
    }
  }
  pop.innerHTML=html;
  pop.style.display='block';
});
document.addEventListener('click',function(e){
  var pop=document.getElementById('mcp-popover');
  var chip=document.getElementById('mcp-chip');
  if(pop&&pop.style.display==='block'&&!pop.contains(e.target)&&e.target!==chip){
    pop.style.display='none';
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
updateLayout();
reportTermSize();
// ── P6: Ubuntu dual-mode (xterm.js live PTY) ──────────────────────────────
(function(){
  if (typeof Terminal === 'undefined') return;   // xterm failed to load — stay chat-only
  var term=null, fit=null, ptyMode=false;
  // Ctrl-chord armed state is SHARED with the unified toolbar via window.__ctrlArmed,
  // so the #btn-ctrl button (outside this IIFE) and the xterm see the same flag and
  // the same amber glow (window.__updateCtrlGlow, defined in the main script).

  function initTerm(){
    if (term) return;
    term = new Terminal({
      fontFamily:"'Space Mono','Courier New',monospace",
      fontSize:11, cursorBlink:true, scrollback:2000, convertEol:false, letterSpacing:0,
      // The default DOM renderer is the only one bundled (no WebGL/Canvas addon),
      // so keep the buffer modest — a huge scrollback makes scroll + reflow heavy
      // on a mobile WebView. fastScrollModifier helps flick-scrolling feel lighter.
      fastScrollModifier:'shift', scrollSensitivity:3,
      theme:{ background:'#0C0C0F', foreground:'#F0F0F2', cursor:'#E8834A',
              selectionBackground:'rgba(232,131,74,0.30)',
              black:'#151518', brightBlack:'#60606E' }
    });
    try { fit = new FitAddon.FitAddon(); term.loadAddon(fit); } catch(_){}
    var mount=document.getElementById('xterm');
    term.open(mount);
    // Renderer selection: prefer GPU (WebGL) → Canvas → default DOM. The DOM
    // renderer mutates one node per cell and is the main source of interactive-
    // TUI lag on a mobile WebView; WebGL draws the grid on the GPU like a native
    // terminal (Termux). Some Android GPUs / WebView builds can't create a WebGL
    // context (or lose it later on backgrounding / driver reset) — degrade
    // gracefully so the terminal is never blank. Must run AFTER term.open().
    (function selectRenderer(){
      var picked='dom';
      try {
        if (typeof WebglAddon!=='undefined' && WebglAddon.WebglAddon){
          var wg=new WebglAddon.WebglAddon();
          // Context loss would leave WebGL drawing nothing — drop to Canvas.
          try { wg.onContextLoss(function(){
            try{ wg.dispose(); }catch(_){}
            try{ if(typeof CanvasAddon!=='undefined'&&CanvasAddon.CanvasAddon){
              term.loadAddon(new CanvasAddon.CanvasAddon()); window.__termRenderer='canvas';
            } }catch(_){}
          }); } catch(_){}
          term.loadAddon(wg);   // throws synchronously if the GL context fails
          picked='webgl';
        }
      } catch(_){ picked='dom'; }
      if (picked==='dom'){
        try {
          if (typeof CanvasAddon!=='undefined' && CanvasAddon.CanvasAddon){
            term.loadAddon(new CanvasAddon.CanvasAddon());
            picked='canvas';
          }
        } catch(_){ picked='dom'; }
      }
      try { window.__termRenderer=picked; } catch(_){}
    })();
    // Harden xterm's hidden input box against the Android IME. Autocorrect /
    // prediction / autocapitalize make the keyboard batch + rewrite keystrokes,
    // which surfaces as "skipped letters" and "types by itself" in the terminal.
    // Turn them all off so each key reaches term.onData cleanly.
    try {
      var ta=mount.querySelector('.xterm-helper-textarea');
      if(ta){
        ta.setAttribute('autocorrect','off');
        ta.setAttribute('autocapitalize','off');
        ta.setAttribute('autocomplete','off');
        ta.setAttribute('spellcheck','false');
        ta.setAttribute('inputmode','text');
      }
    } catch(_){}
    // Diagnostic: proves xterm renders locally. If you SEE this line but no bash
    // prompt → the Kotlin byte-relay (sendPty/onPtyOutput) is the problem (rebuild).
    // If you DON'T see it → xterm render/layout (this file, hotload-able).
    try { term.write('\x1b[2m[ubuntu terminal ready ('+(window.__termRenderer||'dom')+') — connecting shell…]\x1b[0m\r\n'); } catch(_){}
    // Android: a tap inside the terminal is the user-gesture that focuses xterm's
    // hidden textarea and raises the soft keyboard (programmatic focus alone often
    // won't show the IME in a WebView).
    mount.addEventListener('click', function(){ try{ term.focus(); }catch(_){} });
    term.onData(function(d){
      // Ctrl chord (shared armed flag): convert the next typed letter to its control code.
      if(window.__ctrlArmed && d.length===1){
        var c=d.charCodeAt(0);
        if(c>=97&&c<=122) d=String.fromCharCode(c-96);        // a-z → ^A..^Z
        else if(c>=64&&c<=95) d=String.fromCharCode(c-64);    // @[\]^_ and A-Z
        window.__ctrlArmed=false; if(window.__updateCtrlGlow) window.__updateCtrlGlow();
      }
      if(typeof Android!=='undefined'&&Android.sendPty) Android.sendPty(d);
    });
    // Mobile touch-drag scrollback. With the WebGL/Canvas renderer the .xterm-screen
    // canvas sits OVER the native-scroll .xterm-viewport and swallows touch drags, so
    // the viewport never scrolls (the translateZ/will-change layer promotion from the
    // perf pass made the hit-test miss worse). This is why scrollback is dead INSIDE
    // the interactive claude TUI — its conversation lives in the terminal's main-buffer
    // scrollback, but the drag never reaches the scroller. Bind an explicit handler
    // that converts vertical travel into term.scrollLines(): renderer- and z-order-
    // independent. Tap-to-focus is preserved — we only treat it as a scroll once travel
    // passes the slop threshold, and never preventDefault on a stationary tap.
    (function bindTouchScroll(){
      var sy=0, accum=0, dragging=false, rowH=14;
      function rowHeight(){
        try {
          var rows=mount.querySelector('.xterm-rows')||mount.querySelector('.xterm-screen');
          if(rows && term.rows>0 && rows.clientHeight>0) return rows.clientHeight/term.rows;
        } catch(_){}
        return (term.options.fontSize||11)*1.2;
      }
      mount.addEventListener('touchstart', function(e){
        if(e.touches.length!==1) return;
        sy=e.touches[0].clientY; accum=0; dragging=false; rowH=rowHeight();
      }, {passive:true});
      mount.addEventListener('touchmove', function(e){
        if(e.touches.length!==1) return;
        var y=e.touches[0].clientY; accum+=(y-sy); sy=y;
        if(!dragging && Math.abs(accum)<8) return;   // slop: let a tap stay a tap
        dragging=true;
        var whole=(accum>0)?Math.floor(accum/rowH):Math.ceil(accum/rowH);
        if(whole!==0){
          try{ term.scrollLines(-whole); }catch(_){}   // finger down ⇒ reveal older ⇒ scroll up
          accum-=whole*rowH;
        }
        e.preventDefault();   // we own the vertical gesture — no native scroll/zoom on top
      }, {passive:false});
    })();
  }

  // Debounced fit: entering Ubuntu mode + the soft keyboard fire doFit() several
  // times in a burst (rAF + 120ms + 450ms + fonts.ready + every resize event).
  // Each one used to send resizePty immediately → a SIGWINCH storm that made
  // Claude's TUI repaint its whole startup banner over and over (the stacked
  // "Welcome back!" banners). The debounce MUST be wider than the biggest gap
  // between those triggers (120ms→450ms = 330ms) or the timer fires mid-settle and
  // sends 2-3 distinct sizes (font not-yet-loaded vs loaded) → 2-3 banner reprints.
  // 360ms swallows the whole mode-entry settle AND the keyboard-animation burst into
  // ONE resize. Skip when cols/rows didn't actually change so no needless SIGWINCH.
  var fitT=null, lastCols=0, lastRows=0;
  function doFit(){
    if(!fit||!term) return;
    if(fitT) clearTimeout(fitT);
    fitT=setTimeout(function(){
      fitT=null;
      try {
        fit.fit();
        if(term.cols===lastCols && term.rows===lastRows) return;  // no real change → no SIGWINCH
        lastCols=term.cols; lastRows=term.rows;
        if(typeof Android!=='undefined'&&Android.resizePty) Android.resizePty(term.cols, term.rows);
      } catch(_){}
    }, 360);
  }

  // ── Globals called from Kotlin (TerminalActivity) ──
  window.ptyWrite = function(b64){
    initTerm();
    try {
      var bin=atob(b64), u=new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
      term.write(u);
    } catch(e){ try{ term.write(b64); }catch(_){} }
  };
  window.ptyClear = function(){ if(term) term.clear(); };
  // A-/A+ in the toolbar nudge the Ubuntu xterm font too (kept independent of the
  // chat font default, but adjusted by the same buttons), then re-fit the grid.
  window.adjustXtermFont = function(d){
    if(!term) return;
    try { term.options.fontSize = Math.max(7, Math.min(20, (term.options.fontSize||11)+d)); doFit(); } catch(_){}
  };
  // Send a raw key sequence to the PTY (used by the unified toolbar's terminal keys
  // + the shared ↑/↓ when in Ubuntu mode), then keep focus on the terminal.
  window.ptyKey = function(seq){ if(typeof Android!=='undefined'&&Android.sendPty) Android.sendPty(seq); if(term){ try{term.focus();}catch(_){} } };
  window.__focusTerm = function(){ if(term){ try{term.focus();}catch(_){} } };

  window.setMode = function(mode){
    var ub=(mode==='ubuntu');
    ptyMode=ub;
    window.__nexusMode = ub ? 'ubuntu' : 'chat';
    if(window.updateToolbarMode) window.updateToolbarMode(ub);
    document.body.classList.toggle('ubuntu-mode', ub);
    document.getElementById('ubuntu-view').classList.toggle('show', ub);
    document.getElementById('mode-ubuntu').classList.toggle('active', ub);
    document.getElementById('mode-claude').classList.toggle('active', !ub);
    if(ub){
      initTerm();
      // Robust fit: xterm mis-measures cell size if it runs before the view is laid
      // out or the webfont has loaded (→ the "WWWW" measurement-row artifact + a
      // dead-looking grid). Fit across rAF, a couple of delays, and font-ready.
      var fitNow=function(){ doFit(); try{ term.focus(); }catch(_){} };
      requestAnimationFrame(function(){ requestAnimationFrame(fitNow); });
      setTimeout(fitNow, 120); setTimeout(fitNow, 450);
      try { if(document.fonts && document.fonts.ready) document.fonts.ready.then(fitNow); } catch(_){}
    }
  };

  // ── Toggle + toolbar wiring ──
  function switchTo(mode){
    window.setMode(mode);
    if(typeof Android!=='undefined'&&Android.setMode) Android.setMode(mode);
  }
  var mc=document.getElementById('mode-claude'), mu=document.getElementById('mode-ubuntu');
  if(mc) mc.addEventListener('click', function(){ switchTo('chat'); });
  if(mu) mu.addEventListener('click', function(){ switchTo('ubuntu'); });

  // (Terminal-key + Ctrl wiring moved to the unified #toolbar in the main script.)

  // Re-fit on viewport changes (soft keyboard show/hide, rotation).
  window.addEventListener('resize', function(){ if(ptyMode) doFit(); });
})();

if(typeof Android!=='undefined') Android.onTerminalReady();

})();
</script>
