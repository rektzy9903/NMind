<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Terminal</title>
<!-- KaTeX for math rendering ($$...$$) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<!-- Mermaid for diagram rendering (```mermaid blocks) -->
<script defer src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js" crossorigin="anonymous"
  onload="mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose'})"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: 'Space Mono', 'Courier New', monospace;
  background: linear-gradient(135deg, #0a0618 0%, #0d1a2e 50%, #0a0618 100%);
  -webkit-tap-highlight-color: transparent;
}

/* ── Aurora background blobs ─────────────────────────────────────────────── */
.blob {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.blob-1 {
  width: 300px; height: 300px;
  top: -80px; left: -60px;
  background: radial-gradient(circle, rgba(100,60,255,0.28) 0%, transparent 70%);
  filter: blur(32px);
  animation: drift 8s ease-in-out infinite alternate;
}
.blob-2 {
  width: 260px; height: 260px;
  top: -50px; right: -50px;
  background: radial-gradient(circle, rgba(0,200,255,0.2) 0%, transparent 70%);
  filter: blur(26px);
  animation: drift 10s ease-in-out infinite alternate-reverse;
}
.blob-3 {
  width: 300px; height: 200px;
  bottom: 140px; left: 50%;
  background: radial-gradient(circle, rgba(100,60,255,0.08) 0%, transparent 70%);
  filter: blur(28px);
  animation: drift3 12s ease-in-out infinite alternate;
}
@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(20px,15px) scale(1.1); }
}
@keyframes drift3 {
  0%   { transform: translateX(-50%) translate(0,0) scale(1); }
  100% { transform: translateX(-50%) translate(20px,15px) scale(1.1); }
}

@keyframes glowPulse {
  0%,100% { opacity:0.55; transform:scale(1); }
  50%      { opacity:1;    transform:scale(1.35); }
}

/* ── Messages scroll area ────────────────────────────────────────────────── */
#msgs {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 12px 130px 12px;
  -webkit-overflow-scrolling: touch;
  z-index: 10;
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-track { background: transparent; }
#msgs::-webkit-scrollbar-thumb { background: rgba(100,64,255,0.28); border-radius: 2px; }

/* ── Message rows ────────────────────────────────────────────────────────── */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 14px;
}
.user-row { flex-direction: row-reverse; }
.ai-row   { flex-direction: row; }
.sys-row  { justify-content: center; }

/* ── Avatars ─────────────────────────────────────────────────────────────── */
.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  align-self: flex-end;
  font-weight: 700;
}
.user-avatar {
  background: linear-gradient(135deg, #6440ff 0%, #9060ff 100%);
  color: #fff;
  font-size: 11px;
}
.ai-avatar {
  background: linear-gradient(135deg, #00a8d4 0%, #0088cc 100%);
  color: #fff;
  font-size: 15px;
  line-height: 1;
}
/* Provider-specific avatar colours */
.ai-avatar[data-p="anthropic"]  { background: linear-gradient(135deg,#d97706,#f59e0b); }
.ai-avatar[data-p="gemini"]     { background: linear-gradient(135deg,#4285f4,#34a853); }
.ai-avatar[data-p="openrouter"] { background: linear-gradient(135deg,#7c3aed,#9333ea); }
.ai-avatar[data-p="deepseek"]   { background: linear-gradient(135deg,#0ea5e9,#06b6d4); }
.ai-avatar[data-p="kimi"]       { background: linear-gradient(135deg,#2563eb,#1d4ed8); }
.ai-avatar[data-p="nvidia_nim"] { background: linear-gradient(135deg,#16a34a,#22c55e); }
.ai-avatar[data-p="meta_llama"] { background: linear-gradient(135deg,#0068ff,#0ea5e9); }
.ai-avatar[data-p="ollama"]     { background: linear-gradient(135deg,#475569,#334155); }
.ai-avatar[data-p="groq"]       { background: linear-gradient(135deg,#d97706,#b45309); }
.ai-avatar[data-p="local_llama"]{ background: linear-gradient(135deg,#7c3aed,#6d28d9); }

/* ── Bubbles ─────────────────────────────────────────────────────────────── */
.bubble {
  /* min-width:0 lets the flex item shrink below content size so word-wrap works */
  min-width: 0;
  max-width: calc(100% - 44px); /* 28px avatar + 8px gap + 8px safety */
  padding: 10px 13px;
  font-size: 13px;
  line-height: 1.7;
  overflow-wrap: anywhere;
  word-break: break-word;
  font-family: 'Space Mono', 'Courier New', monospace;
}
.user-bubble {
  background: linear-gradient(135deg, rgba(100,64,255,0.25) 0%, rgba(100,64,255,0.12) 100%);
  border: 1px solid rgba(100,64,255,0.35);
  border-radius: 16px 4px 16px 16px;
  color: #f1f5f9;
  white-space: pre-wrap;
}
.ai-bubble {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 4px 16px 16px 16px;
  color: #e2e8f0;
  white-space: pre-wrap;
  min-width: 60px;
}
.sys-bubble {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  color: rgba(148,163,184,0.5);
  font-size: 10px;
  letter-spacing: 0.3px;
  padding: 3px 12px;
  font-family: 'Space Mono', 'Courier New', monospace;
  white-space: pre-wrap;
  max-width: calc(100% - 24px);
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* ── Markdown rendering ──────────────────────────────────────────────────── */
.ai-bubble { white-space: normal; }
.md-code {
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 11px 13px;
  margin: 7px 0;
  overflow-x: auto;
  font-family: 'Space Mono','Courier New',monospace;
  font-size: 12px;
  line-height: 1.65;
  white-space: pre;
  color: #e2e8f0;
}
.md-code code { background: none; padding: 0; }
.md-inline-code {
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'Space Mono','Courier New',monospace;
  font-size: 12px;
  color: #7dd3fc;
}
.md-table {
  border-collapse: collapse;
  width: 100%;
  margin: 6px 0;
  font-size: 12px;
}
.md-table th, .md-table td {
  border: 1px solid rgba(255,255,255,0.15);
  padding: 5px 10px;
  text-align: left;
}
.md-table th {
  background: rgba(255,255,255,0.08);
  color: #93c5fd;
  font-weight: bold;
}
.md-table tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
.hl-kw     { color: #c084fc; }
.hl-str    { color: #86efac; }
.hl-comment{ color: #64748b; font-style: italic; }
.md-h1 { font-size: 16px; font-weight: bold; color: #e2e8f0; margin: 6px 0 3px; }
.md-h2 { font-size: 14px; font-weight: bold; color: #cbd5e1; margin: 5px 0 2px; }
.md-h3 { font-size: 13px; font-weight: bold; color: #94a3b8; margin: 4px 0 2px; }
.md-li { margin-left: 16px; }

/* ── Thinking bubble ─────────────────────────────────────────────────────── */
#thinking-bubble {
  display: none;
  flex-direction: row;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 14px;
}
.thinking-content {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 4px 16px 16px 16px;
  padding: 10px 14px;
  min-width: 120px;
}
.wave-bars {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 26px;
  margin-bottom: 10px;
}
.bar {
  width: 3px;
  background: linear-gradient(to top, #6440ff, #00c8ff);
  border-radius: 2px;
  box-shadow: 0 0 6px rgba(0,200,255,0.4);
  animation: auroraWave 1.2s ease-in-out infinite;
  height: 4px;
  flex-shrink: 0;
}
.bar:nth-child(1){animation-delay:0s}
.bar:nth-child(2){animation-delay:0.1s}
.bar:nth-child(3){animation-delay:0.2s}
.bar:nth-child(4){animation-delay:0.3s}
.bar:nth-child(5){animation-delay:0.4s}
.bar:nth-child(6){animation-delay:0.5s}
.bar:nth-child(7){animation-delay:0.6s}
.bar:nth-child(8){animation-delay:0.7s}
@keyframes auroraWave {
  0%,100% { height:4px; opacity:0.3; }
  50%     { height:22px; opacity:1; }
}
.thinking-footer {
  display: flex;
  align-items: center;
  gap: 8px;
}
.thinking-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00c8ff;
  flex-shrink: 0;
  animation: glowPulse 1.5s ease-in-out infinite;
}
.thinking-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(0,200,255,0.5);
  font-family: 'Space Mono', 'Courier New', monospace;
}
.scan-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, #00c8ff, transparent);
  transform-origin: left;
  animation: scanLine 2s ease-in-out infinite;
}
@keyframes scanLine {
  0%,100% { opacity:0.2; transform:scaleX(0.3); }
  50%     { opacity:1;   transform:scaleX(1); }
}

/* ── ANSI color classes ───────────────────────────────────────────────────── */
.f0{color:#21262D}.f1{color:#F28B82}.f2{color:#81C995}.f3{color:#FFD966}
.f4{color:#82B4FF}.f5{color:#CF9FFF}.f6{color:#5DD6EB}.f7{color:#E2E8F0}
.f8{color:#555570}.f9{color:#FF8A80}.f10{color:#A8FFB0}.f11{color:#FFE680}
.f12{color:#A0CFFF}.f13{color:#E0BAFF}.f14{color:#80ECFF}.f15{color:#FFFFFF}
.b0{background:#21262D}.b1{background:#F28B82}.b2{background:#81C995}
.b3{background:#FFD966}.b4{background:#82B4FF}.b5{background:#CF9FFF}
.b6{background:#5DD6EB}.b7{background:#E2E8F0}
.bold{font-weight:700}
.dim{opacity:0.42}
.italic{font-style:italic}
.underline{text-decoration:underline}
.blink{animation:blink 1s step-end infinite}
.inverse{filter:invert(100%)}
.strikethrough{text-decoration:line-through}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Input bar ───────────────────────────────────────────────────────────── */
#input-bar {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: rgba(8,4,20,0.95);
  border-top: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 90;
  transition: bottom 0.15s ease;
}
#input-wrap {
  flex: 1;
  min-height: 40px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 9px 14px;
  font-family: 'Space Mono', 'Courier New', monospace;
  font-size: 13px;
  color: #f1f5f9;
  display: block;
  cursor: text;
  word-break: break-all;
  overflow-wrap: anywhere;
  line-height: 1.5;
}
#input-display {
  white-space: pre-wrap;
  caret-color: #00c8ff;
}
#cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: #00c8ff;
  border-radius: 1px;
  margin-left: 1px;
  vertical-align: text-bottom;
  animation: cursorBlink 1.2s step-end infinite;
}
@keyframes cursorBlink { 0%,66%{opacity:1} 67%,100%{opacity:0} }

/* ── AI bubble loading dots ──────────────────────────────────────────────── */
.ai-loading {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 0;
}
.ai-loading span {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(0,200,255,0.6);
  animation: aiDotPulse 1.1s ease-in-out infinite;
}
.ai-loading span:nth-child(2) { animation-delay: 0.18s; }
.ai-loading span:nth-child(3) { animation-delay: 0.36s; }
@keyframes aiDotPulse {
  0%,80%,100% { opacity:0.25; transform:scale(0.75); }
  40%         { opacity:1;    transform:scale(1.1); }
}
#send-btn {
  width: 40px; height: 40px;
  border-radius: 13px;
  background: linear-gradient(135deg, #5b35e8 0%, #009bd6 100%);
  box-shadow: 0 2px 12px rgba(100,64,255,0.35);
  border: none;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: rgba(100,64,255,0.3);
  transition: opacity 0.12s, transform 0.1s;
  line-height: 1;
}
#send-btn:active { opacity: 0.7; transform: scale(0.94); }

/* ── Keyboard toolbar ────────────────────────────────────────────────────── */
#toolbar {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  height: 42px;
  background: rgba(8,4,20,0.97);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: none;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  overflow-x: auto;
  z-index: 100;
  -webkit-overflow-scrolling: touch;
}
#toolbar::-webkit-scrollbar { display: none; }
.tb-btn {
  background: rgba(255,255,255,0.04);
  color: #94a3b8;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 4px 11px;
  font-size: 11px;
  font-family: 'Space Mono', 'Courier New', monospace;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.1s;
}
.tb-btn:active { background: rgba(100,64,255,0.2); border-color: rgba(100,64,255,0.4); color: #c4b5fd; }
.tb-accent {
  background: rgba(100,64,255,0.12);
  color: #a78bfa;
  border-color: rgba(100,64,255,0.25);
}
.tb-accent:active { background: rgba(100,64,255,0.28); }

/* ── Extended thinking collapsible ──────────────────────────────────────── */
.thinking-details {
  border: 1px solid rgba(0,200,255,0.15);
  border-radius: 6px;
  margin-bottom: 8px;
  background: rgba(0,200,255,0.04);
}
.thinking-details summary {
  cursor: pointer;
  padding: 4px 10px;
  font-size: 11px;
  color: rgba(0,200,255,0.5);
  letter-spacing: 1px;
  list-style: none;
  user-select: none;
  -webkit-user-select: none;
}
.thinking-details summary::-webkit-details-marker { display: none; }
.thinking-details .think-body {
  padding: 6px 10px 8px;
  font-size: 11px;
  color: rgba(255,255,255,0.38);
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  border-top: 1px solid rgba(0,200,255,0.08);
}

/* ── Context window token counter ────────────────────────────────────────── */
#token-counter {
  position: fixed;
  top: 8px; right: 8px;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(0,200,255,0.35);
  font-family: 'Space Mono','Courier New',monospace;
  z-index: 200;
  pointer-events: none;
  transition: color 0.3s;
}
#token-counter.warn { color: rgba(255,160,60,0.6); }
#token-counter.crit { color: rgba(255,80,80,0.8); }

/* ── Context bar ─────────────────────────────────────────────────────────── */
#ctx-bar-wrap {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  z-index: 199;
  pointer-events: none;
  background: transparent;
}
#ctx-bar-fill {
  height: 2px;
  width: 0%;
  background: rgba(0,200,255,0.5);
  transition: width 0.6s ease, background 0.4s;
}

/* ── Agentic mode badge ───────────────────────────────────────────────────── */
#agentic-badge {
  position: fixed;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  background: rgba(168,85,247,0.18);
  border: 1px solid rgba(168,85,247,0.45);
  border-radius: 20px;
  color: rgba(216,180,254,0.9);
  font-size: 9px;
  font-family: 'Space Mono','Courier New',monospace;
  letter-spacing: 1.5px;
  padding: 3px 10px;
  z-index: 200;
  cursor: pointer;
  display: none;
  user-select: none;
}
#agentic-badge:active { background: rgba(168,85,247,0.35); }

/* ── Mermaid diagrams ─────────────────────────────────────────────────────── */
.md-mermaid {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 12px;
  margin: 6px 0;
  overflow-x: auto;
}
.md-mermaid svg { max-width: 100%; }

/* ── User bubble tap-to-edit ─────────────────────────────────────────────── */
.user-bubble { cursor: pointer; }
.user-bubble:active { opacity: 0.75; }

/* ── Code block copy button ──────────────────────────────────────────────── */
.code-wrap { position: relative; }
.code-copy-btn {
  position: absolute;
  top: 6px; right: 6px;
  background: rgba(255,255,255,0.08);
  color: rgba(200,200,255,0.6);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 5px;
  padding: 2px 8px;
  font-size: 10px;
  font-family: 'Space Mono', 'Courier New', monospace;
  cursor: pointer;
  z-index: 2;
}
.code-copy-btn:active { background: rgba(100,64,255,0.3); color:#c8b8ff; }

/* ── AI bubble action footer ─────────────────────────────────────────────── */
.bubble-act-footer {
  display: none;
  flex-direction: row;
  justify-content: flex-end;
  align-items: center;
  gap: 5px;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.bubble-act-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  color: rgba(148,163,184,0.7);
  font-size: 10px;
  font-family: 'Space Mono', 'Courier New', monospace;
  padding: 3px 8px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.bubble-act-btn:active { background: rgba(100,64,255,0.2); border-color: rgba(100,64,255,0.35); color: #a78bfa; }

/* ── Thinking timer ──────────────────────────────────────────────────────── */
#thinking-timer {
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(0,200,255,0.45);
  font-family: 'Space Mono','Courier New',monospace;
  margin-left: 4px;
}
</style>
</head>
<body>

<!-- Aurora blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Token counter (top-right, shown after first response) -->
<div id="token-counter"></div>

<!-- Context window fill bar (top edge) -->
<div id="ctx-bar-wrap"><div id="ctx-bar-fill"></div></div>

<!-- Agentic mode badge (top-center, tappable to toggle) -->
<div id="agentic-badge">⚡ AGENTIC</div>

<!-- Messages -->
<div id="msgs"></div>

<!-- Thinking bubble (moved into #msgs when active) -->
<div id="thinking-bubble">
  <div class="avatar ai-avatar">◎</div>
  <div class="thinking-content">
    <div class="wave-bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div class="thinking-footer">
      <span class="thinking-dot"></span>
      <span class="thinking-label">THINKING</span>
      <span id="thinking-timer"></span>
      <div class="scan-line"></div>
    </div>
  </div>
</div>

<!-- Image preview indicator (shown when image is attached) -->
<div id="img-preview" style="position:fixed;bottom:68px;left:12px;background:rgba(255,150,50,0.2);border:1px solid rgba(255,150,50,0.4);border-radius:8px;padding:4px 10px;font-size:11px;color:#fbbf24;z-index:91;display:none;cursor:pointer;">📷 Image attached ✕</div>

<!-- Input bar -->
<div id="input-bar">
  <button id="btn-mic" style="width:36px;height:36px;border-radius:10px;background:rgba(100,64,255,0.18);border:1px solid rgba(100,64,255,0.3);color:#c8b8ff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">🎤</button>
  <button id="btn-image" style="width:36px;height:36px;border-radius:10px;background:rgba(255,150,50,0.18);border:1px solid rgba(255,150,50,0.3);color:#fbbf24;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;">📷</button>
  <div id="input-wrap">

<script>
(function(){
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────────
const INPUT_BAR_H = 58;   // px
const TOOLBAR_H   = 44;   // px

// ── Provider avatar config ────────────────────────────────────────────────────
const PROVIDER_AVATAR = {
  anthropic:  '◆',
  gemini:     '✦',
  openrouter: '⬡',
  deepseek:   '⚡',
  kimi:       '◎',
  nvidia_nim: '⬡',
  meta_llama: '▲',
  ollama:     '◎',
  groq:       '⚡',
  local_llama:'◎',
};
var currentProvider = 'default';

// ── DOM refs ──────────────────────────────────────────────────────────────────
const msgs       = document.getElementById('msgs');
const inputBar   = document.getElementById('input-bar');
const toolbar    = document.getElementById('toolbar');
const thinkBub   = document.getElementById('thinking-bubble');
const inputDisp  = document.getElementById('input-display');
const inputWrap  = document.getElementById('input-wrap');

// ── Layout ────────────────────────────────────────────────────────────────────
let toolbarOpen = false;

function updateLayout() {
  const tbOff = toolbarOpen ? TOOLBAR_H : 0;
  inputBar.style.bottom = tbOff + 'px';
  toolbar.style.display = toolbarOpen ? 'flex' : 'none';
  msgs.style.paddingBottom = (INPUT_BAR_H + tbOff + 20) + 'px';
}

// ── ANSI palette ──────────────────────────────────────────────────────────────
const BASE_COLORS = [
  '#21262D','#F28B82','#81C995','#FFD966','#82B4FF','#CF9FFF','#5DD6EB','#E2E8F0',
  '#555570','#FF8A80','#A8FFB0','#FFE680','#A0CFFF','#E0BAFF','#80ECFF','#FFFFFF'
];

function get256Color(n){
  if(n<16) return BASE_COLORS[n];
  if(n>=232){ const g=Math.round((n-232)*10.92); return 'rgb('+g+','+g+','+g+')'; }
  n-=16;
  const b=n%6, g=Math.floor(n/6)%6, r=Math.floor(n/36);
  const c=function(v){return v?v*40+55:0;};
  return 'rgb('+c(r)+','+c(g)+','+c(b)+')';
}

// ── ANSI state factory ────────────────────────────────────────────────────────
// lines is an array of rows; each row is an array of cell objects {ch, a}
// where a is an attrs snapshot. This allows ansiPutChar to overwrite at the
// exact cursor column instead of always appending to the end of a string.
function makeAnsiState(){
  return {
    attrs:resetAttrs(), lines:[[]], curRow:0, curCol:0,
    savedCursor:{row:0,col:0},
    escState:'normal', csiParams:'', csiIntermediate:'', oscBuf:''
  };
}

function resetAttrs(){
  return {bold:false,dim:false,italic:false,underline:false,
          blink:false,inverse:false,strike:false,fg:null,bg:null};
}

function copyAttrs(a){
  return {bold:a.bold,dim:a.dim,italic:a.italic,underline:a.underline,
          blink:a.blink,inverse:a.inverse,strike:a.strike,fg:a.fg,bg:a.bg};
}

function attrsEqual(a,b){
  return a.bold===b.bold&&a.dim===b.dim&&a.italic===b.italic&&
         a.underline===b.underline&&a.blink===b.blink&&a.inverse===b.inverse&&
         a.strike===b.strike&&a.fg===b.fg&&a.bg===b.bg;
}

// Convert cell-array lines to HTML for innerHTML assignment.
function linesToHtml(lines){
  return lines.map(function(cells){
    if(!cells||!cells.length) return '';
    var html='',i=0;
    while(i<cells.length){
      var cell=cells[i],j=i+1;
      while(j<cells.length&&attrsEqual(cells[j].a,cell.a)) j++;
      var text=cells.slice(i,j).map(function(c){return c.ch;}).join('');
      html+=attrsToSpan(cell.a,text);
      i=j;
    }
    return html;
  }).join('\n');
}

function attrsToSpan(a,text){
  if(!text) return '';
  const cls=[],style=[];
  if(a.bold) cls.push('bold');
  if(a.dim)  cls.push('dim');
  if(a.italic) cls.push('italic');
  if(a.underline) cls.push('underline');
  if(a.blink) cls.push('blink');
  if(a.inverse) cls.push('inverse');
  if(a.strike) cls.push('strikethrough');
  if(a.fg!==null){
    if(typeof a.fg==='number'&&a.fg<16) cls.push('f'+a.fg);
    else style.push('color:'+(typeof a.fg==='number'?get256Color(a.fg):a.fg));
  }
  if(a.bg!==null){
    if(typeof a.bg==='number'&&a.bg<8) cls.push('b'+a.bg);
    else style.push('background:'+(typeof a.bg==='number'?get256Color(a.bg):a.bg));
  }
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if(!cls.length&&!style.length) return esc;
  const c=cls.length?' class="'+cls.join(' ')+'"':'';
  const s=style.length?' style="'+style.join(';')+'"':'';
  return '<span'+c+s+'>'+esc+'</span>';
}

// ── ANSI byte processor ───────────────────────────────────────────────────────
function processAnsiBytes(st,raw){
  for(const ch of raw) processAnsiByte(st,ch);
}

function processAnsiByte(st,ch){
  const code=ch.codePointAt(0);
  if(st.escState==='normal'){
    if(code===0x1B){st.escState='esc';return;}
    if(code===0x0A){ansiNewLine(st);return;}
    if(code===0x0D){st.curCol=0;return;}
    if(code===0x08){if(st.curCol>0)st.curCol--;return;}
    if(code===0x09){
      const next=(Math.floor(st.curCol/8)+1)*8;
      while(st.lines.length<=st.curRow)st.lines.push([]);
      const line=st.lines[st.curRow];
      while(st.curCol<next){
        while(line.length<=st.curCol)line.push({ch:' ',a:resetAttrs()});
        line[st.curCol]={ch:' ',a:copyAttrs(st.attrs)};
        st.curCol++;
      }
      return;
    }
    if(code===0x07||code<0x20)return;
    ansiPutChar(st,ch);return;
  }
  if(st.escState==='esc'){
    if(ch==='['){st.escState='csi';st.csiParams='';st.csiIntermediate='';return;}
    if(ch===']'){st.escState='osc';st.oscBuf='';return;}
    if(ch==='7'){st.savedCursor={row:st.curRow,col:st.curCol};st.escState='normal';return;}
    if(ch==='8'){st.curRow=st.savedCursor.row;st.curCol=st.savedCursor.col;st.escState='normal';return;}
    if(ch==='M'){if(st.curRow>0)st.curRow--;st.escState='normal';return;}
    if(ch==='c'){
      st.lines=[[]];st.curRow=0;st.curCol=0;st.attrs=resetAttrs();
      st.escState='normal';return;
    }
    st.escState='normal';return;
  }
  if(st.escState==='osc'){
    if(code===0x07||code===0x1B){handleOSC(st.oscBuf);st.escState='normal';return;}
    st.oscBuf+=ch;return;
  }
  if(st.escState==='str'){
    if(code===0x07||code===0x1B){st.escState='normal';return;}
    return;
  }
  if(st.escState==='csi'){
    if(code>=0x30&&code<=0x3F){st.csiParams+=ch;return;}
    if(code>=0x20&&code<=0x2F){st.csiIntermediate+=ch;return;}
    st.escState='normal';
    handleAnsiCSI(st,st.csiParams,st.csiIntermediate,ch);
  }
}

function ansiPutChar(st,ch){
  while(st.lines.length<=st.curRow)st.lines.push([]);
  const line=st.lines[st.curRow];
  while(line.length<st.curCol)line.push({ch:' ',a:resetAttrs()});
  line[st.curCol]={ch:ch,a:copyAttrs(st.attrs)};
  st.curCol++;
}

function ansiNewLine(st){
  st.curRow++;st.curCol=0;
  while(st.lines.length<=st.curRow)st.lines.push([]);
  if(st.lines.length>2000){
    st.lines.splice(0,st.lines.length-2000);
    st.curRow=Math.max(0,st.curRow-1);
  }
}

function parseParams(raw,def){
  if(!raw)return[def];
  return raw.split(';').map(function(s){return s===''?def:parseInt(s,10);});
}

function handleAnsiCSI(st,params,inter,final){
  switch(final){
    case 'm':handleAnsiSGR(st,params);break;
    case 'H':case 'f':{
      const p=parseParams(params||'1;1',1);
      st.curRow=Math.max(0,(p[0]||1)-1);
      st.curCol=Math.max(0,(p[1]||1)-1);
      while(st.lines.length<=st.curRow)st.lines.push([]);
      break;
    }
    case 'A':{const n=parseParams(params,1)[0]||1;st.curRow=Math.max(0,st.curRow-n);break;}
    case 'B':{const n=parseParams(params,1)[0]||1;st.curRow+=n;while(st.lines.length<=st.curRow)st.lines.push([]);break;}
    case 'C':{const n=parseParams(params,1)[0]||1;st.curCol+=n;break;}
    case 'D':{const n=parseParams(params,1)[0]||1;st.curCol=Math.max(0,st.curCol-n);break;}
    case 'G':{const n=parseParams(params,1)[0]||1;st.curCol=Math.max(0,n-1);break;}
    case 'J':{
      const n=parseParams(params,0)[0];
      if(n===2||n===3){st.lines=[[]];st.curRow=0;st.curCol=0;}
      else if(n===1){for(let i=0;i<=st.curRow;i++)st.lines[i]=[];}
      else{for(let i=st.curRow;i<st.lines.length;i++)st.lines[i]=[];}
      break;
    }
    case 'K':{
      while(st.lines.length<=st.curRow)st.lines.push([]);
      const kn=parseParams(params,0)[0];
      if(kn===1){for(let c=0;c<=st.curCol&&c<st.lines[st.curRow].length;c++)st.lines[st.curRow][c]={ch:' ',a:resetAttrs()};}
      else if(kn===2){st.lines[st.curRow]=[];}
      else{st.lines[st.curRow].splice(st.curCol);}
      break;
    }
    case 's':{st.savedCursor={row:st.curRow,col:st.curCol};break;}
    case 'u':{st.curRow=st.savedCursor.row;st.curCol=st.savedCursor.col;break;}
    case 'h':case 'l':break;
    default:break;
  }
}

function handleAnsiSGR(st,params){
  const codes=parseParams(params,0);
  let i=0;
  while(i<codes.length){
    const c=codes[i++];
    if(c===0){st.attrs=resetAttrs();}
    else if(c===1) st.attrs.bold=true;
    else if(c===2) st.attrs.dim=true;
    else if(c===3) st.attrs.italic=true;
    else if(c===4) st.attrs.underline=true;
    else if(c===5||c===6) st.attrs.blink=true;
    else if(c===7) st.attrs.inverse=true;
    else if(c===9) st.attrs.strike=true;
    else if(c===22){st.attrs.bold=false;st.attrs.dim=false;}
    else if(c===23) st.attrs.italic=false;
    else if(c===24) st.attrs.underline=false;
    else if(c===25) st.attrs.blink=false;
    else if(c===27) st.attrs.inverse=false;
    else if(c===39) st.attrs.fg=null;
    else if(c>=30&&c<=37) st.attrs.fg=c-30;
    else if(c===38){
      if(codes[i]===5){i++;st.attrs.fg=codes[i++];}
      else if(codes[i]===2){i++;const r=codes[i++],g=codes[i++],b=codes[i++];st.attrs.fg='rgb('+r+','+g+','+b+')';}
    }
    else if(c>=40&&c<=47) st.attrs.bg=c-40;
    else if(c===48){
      if(codes[i]===5){i++;st.attrs.bg=codes[i++];}
      else if(codes[i]===2){i++;const r=codes[i++],g=codes[i++],b=codes[i++];st.attrs.bg='rgb('+r+','+g+','+b+')';}
    }
    else if(c===49) st.attrs.bg=null;
    else if(c>=90&&c<=97)   st.attrs.fg=c-90+8;
    else if(c>=100&&c<=107) st.attrs.bg=c-100+8;
  }
}

// ── Input history ─────────────────────────────────────────────────────────
let inputHistory = [];
let historyIdx   = -1;   // -1 = not browsing; ≥0 = index into inputHistory
let savedInput   = '';   // snapshot of inputBuffer before history browsing

function historyUp() {
  if (inputHistory.length === 0) return;
  if (historyIdx === -1) { savedInput = inputBuffer; historyIdx = inputHistory.length - 1; }
  else if (historyIdx > 0) { historyIdx--; }
  inputBuffer = inputHistory[historyIdx];
  ghost.value = inputBuffer;
  updateInputDisp();
  ghost.focus();
}

function historyDown() {
  if (historyIdx === -1) return;
  historyIdx++;
  if (historyIdx >= inputHistory.length) { historyIdx = -1; inputBuffer = savedInput; }
  else { inputBuffer = inputHistory[historyIdx]; }
  ghost.value = inputBuffer;
  updateInputDisp();
  ghost.focus();
}

// ── Thinking timer ────────────────────────────────────────────────────────
let thinkingTimerHandle = null;
let thinkingStartMs = 0;
const thinkingTimerEl = document.getElementById('thinking-timer');

function startThinkingTimer() {
  thinkingStartMs = Date.now();
  thinkingTimerEl.textContent = '0s';
  if (thinkingTimerHandle) clearInterval(thinkingTimerHandle);
  thinkingTimerHandle = setInterval(function() {
    thinkingTimerEl.textContent = Math.floor((Date.now() - thinkingStartMs) / 1000) + 's';
  }, 1000);
}

function stopThinkingTimer() {
  if (thinkingTimerHandle) { clearInterval(thinkingTimerHandle); thinkingTimerHandle = null; }
  thinkingTimerEl.textContent = '';
}

// ── Token formatter ───────────────────────────────────────────────────────
function formatTokens(n){
  if(n>=1000) return (n/1000).toFixed(1)+'k';
  return ''+n;
}

// ── Code copy / save helpers ──────────────────────────────────────────────
function copyCode(btn) {
  var code = btn.nextElementSibling.querySelector('code').textContent;
  if (typeof Android !== 'undefined') Android.copyText(code);
  btn.textContent = '✓ Copied';
  setTimeout(function() { btn.textContent = 'Copy'; }, 1600);
}

function saveCode(btn, filename) {
  var pre = btn.parentElement.querySelector('code');
  var raw = pre.getAttribute('data-raw') || pre.textContent;
  if (typeof Android !== 'undefined') Android.saveFile(filename, raw);
  btn.textContent = '✓ Saved';
  setTimeout(function() { btn.textContent = 'Save'; }, 1600);
}

// ── Export conversation ───────────────────────────────────────────────────
function exportConversation() {
  var text = 'Claude Code Conversation\n' + new Date().toLocaleString() + '\n\n';
  var bubbles = msgs.querySelectorAll('.bubble');
  bubbles.forEach(function(bub) {
    if (bub.classList.contains('user-bubble')) {
      text += 'You: ' + bub.textContent.trim() + '\n\n';
    } else if (bub.classList.contains('ai-bubble')) {
      text += 'Claude: ' + bub.textContent.trim() + '\n\n';
    }
  });
  return text;
}

// ── Chat state machine ─────────────────────────────────────────────────────
// IDLE     — no active response, user input ready
// THINKING — thinking-start received, animation showing
// RESPONDING — thinking-done received, AI bubble collecting output
let chatState = 'IDLE';
let currentAiBubble  = null;  // the .ai-bubble div
let currentAiAnsi    = null;  // ANSI parser state for it
let aiRenderQueued   = false;

// System bubble — collects non-response output (errors, init messages)
let sysEl            = null;
let sysAnsi          = makeAnsiState();
let sysRenderQueued  = false;

function scrollToBottom(){
  msgs.scrollTop = msgs.scrollHeight;
}

// ── OSC handler ───────────────────────────────────────────────────────────────
function resetToIdle(){
  stopThinkingTimer();
  if(chatState==='RESPONDING') finalizeAiBubble();
  thinkBub.style.display='none';
  if(thinkBub.parentNode===msgs) msgs.removeChild(thinkBub);
  chatState='IDLE';
}

function handleOSC(content){
  if(content==='9;thinking-start'){
    if(chatState!=='IDLE') resetToIdle(); // clear any previous stuck state
    chatState='THINKING';
    thinkBub.style.display='flex';
    msgs.appendChild(thinkBub);
    startThinkingTimer();
    scrollToBottom();
  } else if(content==='9;thinking-done'){
    stopThinkingTimer();
    thinkBub.style.display='none';
    if(thinkBub.parentNode===msgs) msgs.removeChild(thinkBub);
    if(chatState==='RESPONDING'){
      resetToIdle(); // second thinking-done = response complete, finalize bubble
    } else if(chatState==='THINKING'){
      chatState='RESPONDING';
      startAiBubble();
    }
  } else if(content.startsWith('9;rate-limit:')){
    // 429 countdown: "9;rate-limit:30" means retry in 30s
    var secs=parseInt(content.slice(13))||30;
    thinkingTimerEl.textContent='⏳ '+secs+'s';
    var cd=secs;
    var cdh=setInterval(function(){
      cd--;
      if(cd<=0){clearInterval(cdh);thinkingTimerEl.textContent='';}
      else{thinkingTimerEl.textContent='⏳ '+cd+'s';}
    },1000);
  } else if(content.startsWith('9;confirm:')){
    var rest=content.slice(10);
    var ci=rest.indexOf(':');
    if(ci!==-1) showConfirmDialog(rest.slice(0,ci), rest.slice(ci+1));
  } else if(content.startsWith('9;suggestions:')){
    try{
      var suggestions=JSON.parse(content.slice(14));
      showSuggestions(suggestions);
    }catch(_){}
  } else if(content.startsWith('9;tokens:')){
    var toks=parseInt(content.slice(9))||0;
    var tokEl=document.getElementById('token-counter');
    var barFill=document.getElementById('ctx-bar-fill');
    if(tokEl&&toks>0){
      tokEl.textContent='~'+formatTokens(toks)+' tokens';
      var pct=Math.min(100,Math.round(toks/2000)); // 200K limit → 100%
      if(toks>180000){ tokEl.className='crit'; }
      else if(toks>120000){ tokEl.className='warn'; }
      else { tokEl.className=''; }
      if(barFill){
        barFill.style.width=pct+'%';
        barFill.style.background=toks>180000?'rgba(255,80,80,0.8)':toks>120000?'rgba(255,160,60,0.6)':'rgba(0,200,255,0.5)';
      }
    }
  } else if(content.startsWith('9;agentic:')){
    var agOn=content.slice(10)==='on';
    var badge=document.getElementById('agentic-badge');
    if(badge) badge.style.display=agOn?'block':'none';
  } else if(content.startsWith('9;think-block:')){
    var enc=content.slice(14);
    var thinkText='';
    try{ thinkText=atob(enc); }catch(_){}
    if(thinkText&&currentAiBubble){
      var det=document.createElement('details');
      det.className='thinking-details';
      var sum=document.createElement('summary');
      sum.textContent='💭 Extended thinking';
      var body=document.createElement('div');
      body.className='think-body';
      body.textContent=thinkText;
      det.appendChild(sum);
      det.appendChild(body);
      currentAiBubble.insertBefore(det,currentAiBubble.firstChild);
      scrollToBottom();
    }
  }
}

// ── Bubble creators ───────────────────────────────────────────────────────────
function addUserBubble(text){
  const row=document.createElement('div');
  row.className='msg-row user-row';
  const av=document.createElement('div');
  av.className='avatar user-avatar';
  av.textContent='U';
  const bub=document.createElement('div');
  bub.className='bubble user-bubble';
  bub.textContent=text;
  bub.title='Tap to edit';
  bub.addEventListener('click',function(){
    if(window.getSelection&&window.getSelection().toString()) return;
    inputBuffer=bub.textContent;
    ghost.value=inputBuffer;
    updateInputDisp();
    ghost.focus();
  });
  row.appendChild(av);
  row.appendChild(bub);
  msgs.appendChild(row);
  scrollToBottom();
}

// ── Markdown renderer ─────────────────────────────────────────────────────────
let rawAiText='';

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlightCode(code,lang){
  const kw={
    javascript:'\\b(const|let|var|function|return|if|else|for|while|class|import|export|from|async|await|new|this|typeof|null|undefined|true|false|throw|try|catch|finally|of|do|switch|case|break|continue|delete|in|instanceof)\\b',
    python:'\\b(def|class|import|from|return|if|elif|else|for|while|in|not|and|or|True|False|None|with|as|try|except|finally|lambda|yield|pass|break|continue|raise|global|nonlocal|del|assert|is)\\b',
    kotlin:'\\b(fun|val|var|class|object|interface|return|if|else|when|for|while|in|is|as|null|true|false|override|private|public|protected|internal|suspend|data|sealed|companion|import|package|by|init|constructor|this|super|throw|try|catch|finally|operator|inline|reified|crossinline|noinline|typealias|enum|annotation|abstract|open|final|lateinit)\\b',
    java:'\\b(class|interface|return|if|else|for|while|new|public|private|protected|static|final|void|null|true|false|import|package|extends|implements|throws|throw|try|catch|finally|this|super|abstract|synchronized|volatile|transient|instanceof|enum|int|long|double|float|boolean|char|byte|short)\\b',
    bash:'\\b(if|then|else|elif|fi|for|while|do|done|in|case|esac|function|return|export|echo|read|exit|source|alias|unset|local|declare|shift|break|continue)\\b',
  };
  const pat=kw[lang]||kw['javascript'];
  code=code.replace(new RegExp(pat,'g'),'<span class="hl-kw">$1</span>');
  code=code.replace(/(&#34;(?:[^\\&#]|\\.)*?&#34;|&#39;(?:[^\\&#]|\\.)*?&#39;)/g,'<span class="hl-str">$1</span>');
  code=code.replace(/(\/\/[^\n]*|#[^\n]*)/g,'<span class="hl-comment">$1</span>');
  return code;
}

function renderInline(t){
  // Inline math $...$ (avoid matching $$ which is handled as block)
  t=t.replace(/(?<!\$)\$(?!\$)([^$\n]+?)\$(?!\$)/g,function(_,expr){return renderMath(expr,false);});
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/__(.+?)__/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  t=t.replace(/`([^`\n]+?)`/g,'<code class="md-inline-code">$1</code>');
  return t;
}

function parseTableRow(line){
  const parts=line.split('|');
  return parts.slice(1,parts.length-1).map(function(s){return s.trim();});
}

// ── KaTeX math rendering ──────────────────────────────────────────────────
function renderMath(expr, display){
  if(typeof katex==='undefined') return (display?'$$':'$')+escHtml(expr)+(display?'$$':'$');
  try{ return katex.renderToString(expr,{displayMode:display,throwOnError:false}); }
  catch(_){ return escHtml(expr); }
}

function renderMarkdown(raw){
  const text=raw.replace(/\x1b\[[0-9;]*[mA-Za-z]/g,'').replace(/\x1b\][^\x07]*\x07/g,'');
  const lines=text.split('\n');
  let html='';let i=0;
  while(i<lines.length){
    const line=lines[i];
    // Fenced code block
    if(/^```/.test(line)){
      const meta=line.slice(3).trim();
      const parts=meta.split(/\s+/);
      const lang=(parts[0]||'').toLowerCase();
      let code='';i++;
      while(i<lines.length&&!/^```/.test(lines[i])){code+=lines[i]+'\n';i++;}
      i++;
      // Mermaid diagram — render as diagram, not code
      if(lang==='mermaid'){html+=renderMermaidBlock(code.trimEnd());continue;}
      // Filename hint: ```lang filename.ext or ```filename.ext
      const hasExt=function(s){return/\.[a-zA-Z0-9]{1,6}$/.test(s);};
      let fname=parts.length>1&&hasExt(parts[1])?parts[1]:
                parts.length===1&&hasExt(parts[0])&&parts[0].indexOf('/')===-1?parts[0]:'';
      const codeEsc=highlightCode(escHtml(code.trimEnd()),lang);
      const saveBtn=fname?'<button class="code-copy-btn" style="right:52px" onclick="saveCode(this,\''+escHtml(fname)+'\')">Save</button>':'';
      const isRunnable=['bash','sh','shell','javascript','js','python','py','node'].includes(lang);
      const runBtn=isRunnable?'<button class="code-copy-btn run-btn" style="right:'+(fname?'98px':'52px')+';background:rgba(0,200,100,0.2);border-color:rgba(0,200,100,0.4);color:#86efac;" onclick="runCodeBlock(this)" data-code="'+escHtml(code.trimEnd())+'" data-lang="'+lang+'">▶ Run</button>':'';
      html+='<div class="code-wrap">'+runBtn+saveBtn+'<button class="code-copy-btn" onclick="copyCode(this)">Copy</button>' +
            '<pre class="md-code"><code data-raw="'+escHtml(code.trimEnd())+'">'+codeEsc+'</code></pre></div>';
      continue;
    }
    // Display math block $$...$$
    if(line.trim()==='$$'){
      let mathExpr='';i++;
      while(i<lines.length&&lines[i].trim()!=='$$'){mathExpr+=lines[i]+'\n';i++;}
      i++;
      html+='<div style="margin:6px 0;overflow-x:auto;">'+renderMath(mathExpr.trim(),true)+'</div>';
      continue;
    }
    // Table
    if(line.indexOf('|')!==-1&&i+1<lines.length&&/^[\s|:+-]+$/.test(lines[i+1])){
      const headers=parseTableRow(line);i+=2;
      let rows=[];
      while(i<lines.length&&lines[i].indexOf('|')!==-1){rows.push(parseTableRow(lines[i]));i++;}
      html+='<table class="md-table"><thead><tr>'+headers.map(function(h){return'<th>'+renderInline(escHtml(h))+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(r){return'<tr>'+r.map(function(c){return'<td>'+renderInline(escHtml(c))+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';
      continue;
    }
    // Headings
    if(/^### /.test(line)){html+='<div class="md-h3">'+renderInline(escHtml(line.slice(4)))+'</div>';i++;continue;}
    if(/^## /.test(line)){html+='<div class="md-h2">'+renderInline(escHtml(line.slice(3)))+'</div>';i++;continue;}
    if(/^# /.test(line)){html+='<div class="md-h1">'+renderInline(escHtml(line.slice(2)))+'</div>';i++;continue;}
    // List items
    if(/^[-*] /.test(line)){html+='<div class="md-li">• '+renderInline(escHtml(line.slice(2)))+'</div>';i++;continue;}
    if(/^\d+\. /.test(line)){const m=line.match(/^(\d+)\. (.*)/);html+='<div class="md-li">'+m[1]+'. '+renderInline(escHtml(m[2]))+'</div>';i++;continue;}
    // Blank line = spacer
    if(line.trim()===''){html+='<div style="height:6px"></div>';i++;continue;}
    // Normal line
    html+='<div>'+renderInline(escHtml(line))+'</div>';i++;
  }
  return html;
}

function hasMarkdownStructures(text){
  return text.indexOf('```')!==-1||/\|.*\|/.test(text)||text.indexOf('**')!==-1||
         /^#{1,3} /m.test(text)||/^[-*] /m.test(text)||
         text.indexOf('$$')!==-1||/\$[^$\n]+\$/.test(text);
}

let aiBubbleHasContent=false;

function renderAiBubble(){
  if(!currentAiBubble||!currentAiAnsi) return;
  const html=linesToHtml(currentAiAnsi.lines);
  if(!html.trim()) return;  // keep loader visible until real content arrives
  if(!aiBubbleHasContent){
    aiBubbleHasContent=true;
    currentAiBubble.innerHTML='';  // remove loader
  }
  currentAiBubble.innerHTML=html;
  scrollToBottom();
}

function scheduleAiRender(){
  if(aiRenderQueued) return;
  aiRenderQueued=true;
  requestAnimationFrame(function(){aiRenderQueued=false;renderAiBubble();});
}

function finalizeAiBubble(){
  if(currentAiBubble){
    if(hasMarkdownStructures(rawAiText)){
      currentAiBubble.innerHTML=renderMarkdown(rawAiText);
    } else if(rawAiText.trim()){
      renderAiBubble();
    } else {
      // no content ever arrived — remove the bubble entirely
      const row=currentAiBubble.parentElement;
      if(row) row.remove();
    }
    // Store raw text so copy button can access it after rawAiText is cleared
    currentAiBubble._rawText=rawAiText;
    // Reveal action footer at bottom of bubble
    const actFooter=currentAiBubble.querySelector('.bubble-act-footer');
    if(actFooter) actFooter.style.display='flex';
    // TTS: speak the response
    if(typeof Android!=='undefined'&&rawAiText.trim()){
      const ttsText=rawAiText.replace(/\x1b\[[0-9;]*m/g,'').replace(/```[\s\S]*?```/g,'[code block]').replace(/[*_#`]/g,'').trim().slice(0,500);
      if(ttsText) Android.speakText(ttsText);
    }
    scrollToBottom();
  }
  rawAiText='';
  currentAiBubble=null;
  currentAiAnsi=null;
  aiBubbleHasContent=false;
  chatState='IDLE';
}

    scheduleAiRender();
  } else {
    processAnsiBytes(sysAnsi,raw);
    // OSC sequences (e.g. thinking-start) change chatState during processAnsiBytes;
    // only create a sys bubble if we're still IDLE and have visible text.
    if(chatState!=='IDLE') return;
    const hasText=sysAnsi.lines.some(function(l){return l&&l.length>0;});
    if(hasText){getSysBubble();scheduleSysRender();}
  }
};

function submitLine(text){
  const msg=(text!==undefined?text:inputBuffer).trim();
  inputBuffer='';
  ghost.value='';
  historyIdx=-1;
  savedInput='';
  updateInputDisp();
  if(!msg && !pendingImageAttached) return;
  const displayMsg = msg || '📷';
  // Push to input history (skip duplicates of the last entry)
  if(msg.length>0&&inputHistory[inputHistory.length-1]!==msg){
    inputHistory.push(msg);
    if(inputHistory.length>50) inputHistory.shift();
  }
  resetToIdle(); // finalize any pending AI bubble and hide thinking animation
  sysEl=null;
  sysAnsi=makeAnsiState();
  // Remove suggestions bar if present
  const sb=document.getElementById('suggestions-bar');if(sb)sb.remove();
  addUserBubble(displayMsg);
  if(typeof Android!=='undefined'){
    if(pendingImageAttached){
      pendingImageAttached=false;
      imgPreviewEl.style.display='none';
      Android.submitMessageWithImage(msg);
    } else {
      Android.submitMessage(msg);
    }
  }
}

// Send inputBuffer (or empty string) directly to PTY without the chat-message
// path. This avoids addUserBubble + resetToIdle which cause misalignment when
// interacting with Claude Code's TUI menus (theme picker, prompts, etc.).
// The send button (→) still uses submitLine() for proper chat message behavior.
function sendRawInput(){
  const text=inputBuffer;
  inputBuffer='';ghost.value='';historyIdx=-1;savedInput='';
  updateInputDisp();
  if(text.length>0){
    if(inputHistory[inputHistory.length-1]!==text){
      inputHistory.push(text);if(inputHistory.length>50)inputHistory.shift();
    }
    tbRaw(text+'\r');
  } else {
    tbRaw('\r');
  }
}
ghost.addEventListener('input',function(){
  const val=ghost.value;
  if(val.includes('\n')){
    ghost.value=val.replace(/\n/g,'');
    inputBuffer=ghost.value;
    updateInputDisp();
    sendRawInput();
    return;
  }
  inputBuffer=val;
  updateInputDisp();
});
ghost.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();sendRawInput();}
  else if(e.key==='ArrowUp'){e.preventDefault();if(inputBuffer.length===0){tbRaw('\x1b[A');}else{historyUp();}}
  else if(e.key==='ArrowDown'){e.preventDefault();if(historyIdx===-1){tbRaw('\x1b[B');}else{historyDown();}}
  else if(e.key==='ArrowLeft'){e.preventDefault();tbRaw('\x1b[D');}
  else if(e.key==='ArrowRight'){e.preventDefault();tbRaw('\x1b[C');}
  else if(e.key==='Tab'){e.preventDefault();tbRaw('\t');}
  else if(e.key==='Escape'){e.preventDefault();tbRaw('\x1b');}
  else if(e.key==='Backspace'){
    if(inputBuffer.length>0){e.preventDefault();inputBuffer=inputBuffer.slice(0,-1);ghost.value=inputBuffer;updateInputDisp();}
    else{e.preventDefault();tbRaw('\x7f');}
  }
});

// ── Terminal size reporting ────────────────────────────────────────────────────
// Measures the character grid and notifies Kotlin so bridge.js can forward
// accurate COLS/ROWS to libpty-helper.so via TIOCSWINSZ.
function reportTermSize(){
  var probe=document.createElement('span');
  probe.style.cssText='position:absolute;visibility:hidden;font-family:Space Mono,Courier New,monospace;font-size:'+termFontSize+'px;white-space:pre;';
  probe.textContent='X';
  document.body.appendChild(probe);
  var r=probe.getBoundingClientRect();
  var charW=r.width||8;
  var charH=r.height||termFontSize*1.5;
  document.body.removeChild(probe);
  var cols=Math.max(40,Math.floor(window.innerWidth/charW));
  var rows=Math.max(10,Math.floor(window.innerHeight/charH));
  if(typeof Android!=='undefined'&&Android.notifyResize) Android.notifyResize(cols,rows);
}
window.addEventListener('resize',reportTermSize);
