<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Terminal</title>
<!-- KaTeX for math rendering ($$...$$) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<!-- Mermaid for diagram rendering (```mermaid blocks) -->
<script defer src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js" crossorigin="anonymous"
  onload="mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose'})"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: 'Space Mono', 'Courier New', monospace;
  background: #0C0C0F;
  -webkit-tap-highlight-color: transparent;
}

/* ── Aurora background blobs ─────────────────────────────────────────────── */
.blob {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.blob-1 {
  width: 300px; height: 300px;
  top: -80px; left: -60px;
  background: radial-gradient(circle, rgba(232,131,74,0.08) 0%, transparent 70%);
  filter: blur(32px);
  animation: drift 8s ease-in-out infinite alternate;
}
.blob-2 {
  width: 260px; height: 260px;
  top: -50px; right: -50px;
  background: radial-gradient(circle, rgba(232,131,74,0.05) 0%, transparent 70%);
  filter: blur(26px);
  animation: drift 10s ease-in-out infinite alternate-reverse;
}
.blob-3 {
  width: 300px; height: 200px;
  bottom: 140px; left: 50%;
  background: radial-gradient(circle, rgba(232,131,74,0.04) 0%, transparent 70%);
  filter: blur(28px);
  animation: drift3 12s ease-in-out infinite alternate;
}
@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(20px,15px) scale(1.1); }
}
@keyframes drift3 {
  0%   { transform: translateX(-50%) translate(0,0) scale(1); }
  100% { transform: translateX(-50%) translate(20px,15px) scale(1.1); }
}

@keyframes glowPulse {
  0%,100% { opacity:0.55; transform:scale(1); }
  50%      { opacity:1;    transform:scale(1.35); }
}

/* ── Messages scroll area ────────────────────────────────────────────────── */
#msgs {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 12px 130px 12px;
  -webkit-overflow-scrolling: touch;
  z-index: 10;
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-track { background: transparent; }
#msgs::-webkit-scrollbar-thumb { background: rgba(232,131,74,0.28); border-radius: 2px; }

/* ── Message rows ────────────────────────────────────────────────────────── */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 14px;
}
.user-row { flex-direction: row-reverse; }
.ai-row   { flex-direction: row; }
.sys-row  { flex-direction: column; align-items: stretch; }

/* ── Avatars ─────────────────────────────────────────────────────────────── */
.avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  align-self: flex-end;
  font-weight: 700;
}
.user-avatar {
  background: linear-gradient(135deg, #E8834A 0%, #C4632A 100%);
  color: #fff;
  font-size: 11px;
}
.ai-avatar {
  background: #1E1E22;
  border: 1px solid #3A3A42;
  border-radius: 7px !important; /* rounded square, override base 50% */
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Provider-specific avatar: dark neutral tint matching each brand, SVG icon drawn via innerHTML */
.ai-avatar[data-p="anthropic"]  { background:#1A1410; border:1px solid #3A2A1E; }
.ai-avatar[data-p="gemini"]     { background:#0F1420; border:1px solid #1E2840; }
.ai-avatar[data-p="openrouter"] { background:#100F1A; border:1px solid #2A2A3A; }
.ai-avatar[data-p="deepseek"]   { background:#0D1520; border:1px solid #1A2E44; }
.ai-avatar[data-p="kimi"]       { background:#0E1520; border:1px solid #1E2A3A; }
.ai-avatar[data-p="nvidia_nim"] { background:#0A1A10; border:1px solid #1A3020; }
.ai-avatar[data-p="meta_llama"] { background:#1A100F; border:1px solid #3A2020; }
.ai-avatar[data-p="ollama"]     { background:#141414; border:1px solid #2A2A2A; }
.ai-avatar[data-p="groq"]       { background:#141A0F; border:1px solid #2A3A1E; }
.ai-avatar[data-p="local_llama"]{ background:#141414; border:1px solid #2A2A2A; }

/* ── Bubbles ─────────────────────────────────────────────────────────────── */
.bubble {
  /* min-width:0 lets the flex item shrink below content size so word-wrap works */
  min-width: 0;
  max-width: calc(100% - 42px); /* 26px avatar + 8px gap + 8px safety */
  padding: 10px 13px;
  font-size: 13px;
  line-height: 1.7;
  overflow-wrap: anywhere;
  word-break: break-word;
  font-family: 'Space Mono', 'Courier New', monospace;
}
.user-bubble {
  background: rgba(232,131,74,0.16);
  border: 1px solid rgba(232,131,74,0.30);
  border-radius: 14px 14px 4px 14px;
  color: #F0F0F2;
  white-space: pre-wrap;
}
.ai-bubble {
  background: #1E1E22;
  border: 1px solid #2A2A30;
  border-radius: 4px 14px 14px 14px;
  color: #F0F0F2;
  white-space: pre-wrap;
  min-width: 60px;
  line-height: 1.55;
}
.sys-bubble {
  background: none;
  border: none;
  border-radius: 0;
  color: #60606E;
  font-size: 11px;
  letter-spacing: 0;
  padding: 2px 0;
  font-family: 'Space Mono', 'Courier New', monospace;
  white-space: pre-wrap;
  max-width: calc(100% - 24px);
  overflow-wrap: anywhere;
  word-break: break-word;
  display: flex; align-items: center; gap: 6px;
}

.sys-bubble::before {
  content: '';
  width: 3px; height: 3px;
  background: #60606E;
  border-radius: 50%;
  flex-shrink: 0;
}
.sys-output {
  background: #0A0A0C;
  border: 1px solid #2A2A30;
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Space Mono', 'Courier New', monospace;
  font-size: 11.5px;
  color: #3DD68C;
  margin-top: 4px;
  white-space: pre;
  overflow-x: auto;
  overflow-wrap: normal;
  word-break: normal;
  display: none;
}

/* ── Markdown rendering ──────────────────────────────────────────────────── */
.ai-bubble { white-space: normal; }
.md-code {
  background: #0A0A0C;
  border: 1px solid #2A2A30;
  border-radius: 8px;
  padding: 11px 13px;
  margin: 7px 0;
  overflow-x: auto;
  font-family: 'Space Mono','Courier New',monospace;
  font-size: 12px;
  line-height: 1.65;
  white-space: pre;
  color: #e2e8f0;
}
.md-code code { background: none; padding: 0; }
.md-inline-code {
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: 'Space Mono','Courier New',monospace;
  font-size: 12px;
  color: #7dd3fc;
}
.md-table {
  border-collapse: collapse;
  width: 100%;
  margin: 6px 0;
  font-size: 12px;
}
.md-table th, .md-table td {
  border: 1px solid rgba(255,255,255,0.15);
  padding: 5px 10px;
  text-align: left;
}
.md-table th {
  background: rgba(255,255,255,0.08);
  color: #93c5fd;
  font-weight: bold;
}
.md-table tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
.hl-kw     { color: #c084fc; }
.hl-str    { color: #86efac; }
.hl-comment{ color: #64748b; font-style: italic; }
.md-h1 { font-size: 16px; font-weight: bold; color: #e2e8f0; margin: 6px 0 3px; }
.md-h2 { font-size: 14px; font-weight: bold; color: #cbd5e1; margin: 5px 0 2px; }
.md-h3 { font-size: 13px; font-weight: bold; color: #94a3b8; margin: 4px 0 2px; }
.md-li { margin-left: 16px; }

/* ── Thinking bubble ─────────────────────────────────────────────────────── */
#thinking-bubble {
  display: none;
  flex-direction: row;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 14px;
}
.thinking-content {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
}
.thinking-dots {
  display: flex;
  gap: 4px;
}
.thinking-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #E8834A;
  flex-shrink: 0;
  animation: thinkDot 1.2s ease-in-out infinite;
}
.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes thinkDot {
  0%,80%,100% { opacity: 0.2; transform: scale(0.85); }
  40%         { opacity: 1;   transform: scale(1); }
}
.thinking-label {
  font-size: 12px;
  color: #60606E;
  font-family: 'Space Mono', 'Courier New', monospace;
}

/* ── ANSI color classes ───────────────────────────────────────────────────── */
.f0{color:#21262D}.f1{color:#F28B82}.f2{color:#81C995}.f3{color:#FFD966}
.f4{color:#82B4FF}.f5{color:#CF9FFF}.f6{color:#5DD6EB}.f7{color:#E2E8F0}
.f8{color:#555570}.f9{color:#FF8A80}.f10{color:#A8FFB0}.f11{color:#FFE680}
.f12{color:#A0CFFF}.f13{color:#E0BAFF}.f14{color:#80ECFF}.f15{color:#FFFFFF}
.b0{background:#21262D}.b1{background:#F28B82}.b2{background:#81C995}
.b3{background:#FFD966}.b4{background:#82B4FF}.b5{background:#CF9FFF}
.b6{background:#5DD6EB}.b7{background:#E2E8F0}
.bold{font-weight:700}
.dim{opacity:0.42}
.italic{font-style:italic}
.underline{text-decoration:underline}
.blink{animation:blink 1s step-end infinite}
.inverse{filter:invert(100%)}
.strikethrough{text-decoration:line-through}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Input bar ───────────────────────────────────────────────────────────── */
#input-bar {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: rgba(12,12,15,0.95);
  border-top: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 90;
  transition: bottom 0.15s ease;
}
#input-wrap {
  flex: 1;
  min-height: 40px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 9px 14px;
  font-family: 'Space Mono', 'Courier New', monospace;
  font-size: 13px;
  color: #f1f5f9;
  display: block;
  cursor: text;
  word-break: break-all;
  overflow-wrap: anywhere;
  line-height: 1.5;
}
#input-display {
  white-space: pre-wrap;
  caret-color: #E8834A;
}
#cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: #E8834A;
  border-radius: 1px;
  margin-left: 1px;
  vertical-align: text-bottom;
  animation: cursorBlink 1.2s step-end infinite;
}
@keyframes cursorBlink { 0%,66%{opacity:1} 67%,100%{opacity:0} }

/* ── AI bubble loading dots ──────────────────────────────────────────────── */
.ai-loading {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 0;
}
.ai-loading span {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(232,131,74,0.6);
  animation: aiDotPulse 1.1s ease-in-out infinite;
}
.ai-loading span:nth-child(2) { animation-delay: 0.18s; }
.ai-loading span:nth-child(3) { animation-delay: 0.36s; }
@keyframes aiDotPulse {
  0%,80%,100% { opacity:0.25; transform:scale(0.75); }
  40%         { opacity:1;    transform:scale(1.1); }
}
#send-btn {
  width: 40px; height: 40px;
  border-radius: 13px;
  background: linear-gradient(135deg, #E8834A 0%, #C4632A 100%);
  box-shadow: 0 2px 12px rgba(232,131,74,0.35);
  border: none;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: rgba(232,131,74,0.3);
  transition: opacity 0.12s, transform 0.1s;
  line-height: 1;
}
#send-btn:active { opacity: 0.7; transform: scale(0.94); }

/* ── Keyboard toolbar ────────────────────────────────────────────────────── */
#toolbar {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  height: 42px;
  background: rgba(12,12,15,0.97);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: none;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  overflow-x: auto;
  z-index: 100;
  -webkit-overflow-scrolling: touch;
}
#toolbar::-webkit-scrollbar { display: none; }
.tb-btn {
  background: rgba(255,255,255,0.04);
  color: #94a3b8;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 4px 11px;
  font-size: 11px;
  font-family: 'Space Mono', 'Courier New', monospace;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.1s;
}
.tb-btn:active { background: rgba(232,131,74,0.2); border-color: rgba(232,131,74,0.4); color: #E8834A; }
.tb-accent {
  background: rgba(232,131,74,0.12);
  color: #E8834A;
  border-color: rgba(232,131,74,0.25);
}
.tb-accent:active { background: rgba(232,131,74,0.28); }
.tb-ctrl-active {
  background: rgba(59,130,246,0.25) !important;
  border-color: rgba(59,130,246,0.6) !important;
  color: #93c5fd !important;
}

/* ── Extended thinking collapsible ──────────────────────────────────────── */
.thinking-details {
  border: 1px solid rgba(232,131,74,0.15);
  border-radius: 6px;
  margin-bottom: 8px;
  background: rgba(232,131,74,0.04);
}
.thinking-details summary {
  cursor: pointer;
  padding: 4px 10px;
  font-size: 11px;
  color: rgba(232,131,74,0.5);
  letter-spacing: 1px;
  list-style: none;
  user-select: none;
  -webkit-user-select: none;
}
.thinking-details summary::-webkit-details-marker { display: none; }
.thinking-details .think-body {
  padding: 6px 10px 8px;
  font-size: 11px;
  color: rgba(255,255,255,0.38);
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  border-top: 1px solid rgba(232,131,74,0.08);
}

/* ── Context window token counter ────────────────────────────────────────── */
#token-counter {
  position: fixed;
  top: 8px; right: 8px;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(232,131,74,0.35);
  font-family: 'Space Mono','Courier New',monospace;
  z-index: 200;
  pointer-events: none;
  transition: color 0.3s;
}
#token-counter.warn { color: rgba(255,160,60,0.6); }
#token-counter.crit { color: rgba(255,80,80,0.8); }

/* ── Context bar ─────────────────────────────────────────────────────────── */
#ctx-bar-wrap {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  z-index: 199;
  pointer-events: none;
  background: transparent;
}
#ctx-bar-fill {
  height: 2px;
  width: 0%;
  background: rgba(232,131,74,0.5);
  transition: width 0.6s ease, background 0.4s;
}

/* ── Agentic mode badge ───────────────────────────────────────────────────── */
#agentic-badge {
  position: fixed;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  background: rgba(168,85,247,0.18);
  border: 1px solid rgba(168,85,247,0.45);
  border-radius: 20px;
  color: rgba(216,180,254,0.9);
  font-size: 9px;
  font-family: 'Space Mono','Courier New',monospace;
  letter-spacing: 1.5px;
  padding: 3px 10px;
  z-index: 200;
  cursor: pointer;
  display: none;
  user-select: none;
}
#agentic-badge:active { background: rgba(168,85,247,0.35); }

/* ── MCP status chip ──────────────────────────────────────────────────────── */
#mcp-chip {
  position: fixed;
  top: 8px; left: 8px;
  background: rgba(0,200,100,0.12);
  border: 1px solid rgba(0,200,100,0.35);
  border-radius: 20px;
  color: rgba(134,239,172,0.85);
  font-size: 9px;
  font-family: 'Space Mono','Courier New',monospace;
  letter-spacing: 1px;
  padding: 3px 8px;
  z-index: 200;
  cursor: pointer;
  display: none;
  user-select: none;
}
#mcp-chip:active { background: rgba(0,200,100,0.28); }
#mcp-popover {
  position: fixed;
  top: 28px; left: 8px;
  min-width: 180px; max-width: 270px;
  background: rgba(10,16,26,0.97);
  border: 1px solid rgba(0,200,100,0.3);
  border-radius: 12px;
  padding: 10px 12px;
  z-index: 300;
  display: none;
  font-family: 'Space Mono','Courier New',monospace;
  font-size: 10px;
  color: rgba(200,230,210,0.9);
  max-height: 55vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.mcp-server-hd { color:rgba(134,239,172,0.9); font-weight:bold; margin-top:4px; }
.mcp-tool-row  { color:rgba(148,197,234,0.75); padding-left:8px; font-size:9px; line-height:1.7; }

/* ── Mermaid diagrams ─────────────────────────────────────────────────────── */
.md-mermaid {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 12px;
  margin: 6px 0;
  overflow-x: auto;
}
.md-mermaid svg { max-width: 100%; }

/* ── User bubble tap-to-edit ─────────────────────────────────────────────── */
.user-bubble { cursor: pointer; }
.user-bubble:active { opacity: 0.75; }

/* ── Code block copy button ──────────────────────────────────────────────── */
.code-wrap { position: relative; }
.code-copy-btn {
  position: absolute;
  top: 6px; right: 6px;
  background: rgba(255,255,255,0.08);
  color: rgba(144,144,160,0.8);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 5px;
  padding: 2px 8px;
  font-size: 10px;
  font-family: 'Space Mono', 'Courier New', monospace;
  cursor: pointer;
  z-index: 2;
}
.code-copy-btn:active { background: rgba(232,131,74,0.3); color:#E8834A; }

/* ── AI bubble action footer ─────────────────────────────────────────────── */
.bubble-act-footer {
  display: none;
  flex-direction: row;
  justify-content: flex-end;
  align-items: center;
  gap: 5px;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.bubble-act-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  color: rgba(148,163,184,0.7);
  font-size: 10px;
  font-family: 'Space Mono', 'Courier New', monospace;
  padding: 3px 8px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.bubble-act-btn:active { background: rgba(232,131,74,0.2); border-color: rgba(232,131,74,0.35); color: #E8834A; }

/* ── Thinking timer ──────────────────────────────────────────────────────── */
#thinking-timer {
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(232,131,74,0.45);
  font-family: 'Space Mono','Courier New',monospace;
  margin-left: 4px;
}

/* ── Sub-agent panel ─────────────────────────────────────────────────────── */
.agent-panel {
  margin: 6px 4px;
  border-radius: 14px;
  background: #151518;
  border: 1px solid #2A2A30;
  box-shadow: 0 4px 20px rgba(232,131,74,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 14px 8px;
  gap: 6px;
}
.agent-panel-header {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 100%;
}
.agent-panel-title {
  color: #E8834A;
  font-size: 11px;
  font-family: 'Space Mono','Courier New',monospace;
  font-weight: 600;
  flex: 1;
}
.agent-panel-count {
  color: rgba(232,131,74,0.5);
  font-size: 9px;
  font-family: 'Space Mono','Courier New',monospace;
}
.agent-panel-desc {
  width: 100%;
  font-size: 10px;
  font-family: 'Space Mono','Courier New',monospace;
  color: rgba(232,131,74,0.45);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* SVG animation keyframes */
@keyframes ap-pulse1 { 0%{r:13px;opacity:.18} 100%{r:21px;opacity:0} }

  meta_llama:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E06030" stroke-width="1.8" stroke-linecap="round"><path d="M7 18C7 12 9 7 12 7C15 7 17 12 17 18"/><path d="M5 14C5 10 8 6 12 6C16 6 19 10 19 14" opacity="0.45"/></svg>',
  ollama:        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9090A0" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2.5" fill="#9090A0" stroke="none" opacity="0.5"/><line x1="12" y1="5" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="19"/><line x1="5" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="19" y2="12"/></svg>',
  local_llama:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9090A0" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2.5" fill="#9090A0" stroke="none" opacity="0.5"/><line x1="12" y1="5" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="19"/><line x1="5" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="19" y2="12"/></svg>',
};
const PROVIDER_AVATAR_DEFAULT = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E8834A" stroke-width="1.8" stroke-linecap="round"><polygon points="12,1 23,12 12,23 1,12"/><line x1="12" y1="1" x2="12" y2="12"/><line x1="23" y1="12" x2="12" y2="12"/><line x1="12" y1="23" x2="12" y2="12"/><line x1="1" y1="12" x2="12" y2="12"/><circle cx="12" cy="12" r="2.2" fill="#E8834A" stroke="none"/></svg>';
var currentProvider = 'default';

// ── DOM refs ──────────────────────────────────────────────────────────────────
const msgs       = document.getElementById('msgs');
const inputBar   = document.getElementById('input-bar');
const toolbar    = document.getElementById('toolbar');
const thinkBub   = document.getElementById('thinking-bubble');
const inputDisp  = document.getElementById('input-display');
const inputWrap  = document.getElementById('input-wrap');

// ── Layout ────────────────────────────────────────────────────────────────────
let toolbarOpen = false;

function updateLayout() {
  const tbOff = toolbarOpen ? TOOLBAR_H : 0;
  inputBar.style.bottom = tbOff + 'px';
  toolbar.style.display = toolbarOpen ? 'flex' : 'none';
  msgs.style.paddingBottom = (INPUT_BAR_H + tbOff + 20) + 'px';
}

// ── ANSI palette ──────────────────────────────────────────────────────────────
const BASE_COLORS = [
  '#21262D','#F28B82','#81C995','#FFD966','#82B4FF','#CF9FFF','#5DD6EB','#E2E8F0',
  '#555570','#FF8A80','#A8FFB0','#FFE680','#A0CFFF','#E0BAFF','#80ECFF','#FFFFFF'
];

function get256Color(n){
  if(n<16) return BASE_COLORS[n];
  if(n>=232){ const g=Math.round((n-232)*10.92); return 'rgb('+g+','+g+','+g+')'; }
  n-=16;
  const b=n%6, g=Math.floor(n/6)%6, r=Math.floor(n/36);
  const c=function(v){return v?v*40+55:0;};
  return 'rgb('+c(r)+','+c(g)+','+c(b)+')';
}

// ── ANSI state factory ────────────────────────────────────────────────────────
// lines is an array of rows; each row is an array of cell objects {ch, a}
// where a is an attrs snapshot. This allows ansiPutChar to overwrite at the
// exact cursor column instead of always appending to the end of a string.
function makeAnsiState(){
  return {
    attrs:resetAttrs(), lines:[[]], curRow:0, curCol:0,
    savedCursor:{row:0,col:0},
    escState:'normal', csiParams:'', csiIntermediate:'', oscBuf:''
  };
}

function resetAttrs(){
  return {bold:false,dim:false,italic:false,underline:false,
          blink:false,inverse:false,strike:false,fg:null,bg:null};
}

function copyAttrs(a){
  return {bold:a.bold,dim:a.dim,italic:a.italic,underline:a.underline,
          blink:a.blink,inverse:a.inverse,strike:a.strike,fg:a.fg,bg:a.bg};
}

function attrsEqual(a,b){
  return a.bold===b.bold&&a.dim===b.dim&&a.italic===b.italic&&
         a.underline===b.underline&&a.blink===b.blink&&a.inverse===b.inverse&&
         a.strike===b.strike&&a.fg===b.fg&&a.bg===b.bg;
}

// Convert cell-array lines to HTML for innerHTML assignment.
function linesToHtml(lines){
  return lines.map(function(cells){
    if(!cells||!cells.length) return '';
    var html='',i=0;
    while(i<cells.length){
      var cell=cells[i],j=i+1;
      while(j<cells.length&&attrsEqual(cells[j].a,cell.a)) j++;
      var text=cells.slice(i,j).map(function(c){return c.ch;}).join('');
      html+=attrsToSpan(cell.a,text);
      i=j;
    }
    return html;
  }).join('\n');
}

function attrsToSpan(a,text){
  if(!text) return '';
  const cls=[],style=[];
  if(a.bold) cls.push('bold');
  if(a.dim)  cls.push('dim');
  if(a.italic) cls.push('italic');
  if(a.underline) cls.push('underline');
  if(a.blink) cls.push('blink');
  if(a.inverse) cls.push('inverse');
  if(a.strike) cls.push('strikethrough');
  if(a.fg!==null){
    if(typeof a.fg==='number'&&a.fg<16) cls.push('f'+a.fg);
    else style.push('color:'+(typeof a.fg==='number'?get256Color(a.fg):a.fg));
  }
  if(a.bg!==null){
    if(typeof a.bg==='number'&&a.bg<8) cls.push('b'+a.bg);
    else style.push('background:'+(typeof a.bg==='number'?get256Color(a.bg):a.bg));
  }
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if(!cls.length&&!style.length) return esc;
  const c=cls.length?' class="'+cls.join(' ')+'"':'';
  const s=style.length?' style="'+style.join(';')+'"':'';
  return '<span'+c+s+'>'+esc+'</span>';
}

// ── ANSI byte processor ───────────────────────────────────────────────────────
function processAnsiBytes(st,raw){
  for(const ch of raw) processAnsiByte(st,ch);
}

function processAnsiByte(st,ch){
  const code=ch.codePointAt(0);
  if(st.escState==='normal'){
    if(code===0x1B){st.escState='esc';return;}
    if(code===0x0A){ansiNewLine(st);return;}
    if(code===0x0D){st.curCol=0;return;}
    if(code===0x08){if(st.curCol>0)st.curCol--;return;}
    if(code===0x09){
      const next=(Math.floor(st.curCol/8)+1)*8;
      while(st.lines.length<=st.curRow)st.lines.push([]);
      const line=st.lines[st.curRow];
      while(st.curCol<next){
        while(line.length<=st.curCol)line.push({ch:' ',a:resetAttrs()});
        line[st.curCol]={ch:' ',a:copyAttrs(st.attrs)};
        st.curCol++;
      }
      return;
    }
    if(code===0x07||code<0x20)return;
    ansiPutChar(st,ch);return;
  }
  if(st.escState==='esc'){
    if(ch==='['){st.escState='csi';st.csiParams='';st.csiIntermediate='';return;}
    if(ch===']'){st.escState='osc';st.oscBuf='';return;}
    if(ch==='7'){st.savedCursor={row:st.curRow,col:st.curCol};st.escState='normal';return;}
    if(ch==='8'){st.curRow=st.savedCursor.row;st.curCol=st.savedCursor.col;st.escState='normal';return;}
    if(ch==='M'){if(st.curRow>0)st.curRow--;st.escState='normal';return;}
    if(ch==='c'){
      st.lines=[[]];st.curRow=0;st.curCol=0;st.attrs=resetAttrs();
      st.escState='normal';return;
    }
    st.escState='normal';return;
  }
  if(st.escState==='osc'){
    if(code===0x07||code===0x1B){handleOSC(st.oscBuf);st.escState='normal';return;}
    st.oscBuf+=ch;return;
  }
  if(st.escState==='str'){
    if(code===0x07||code===0x1B){st.escState='normal';return;}
    return;
  }
  if(st.escState==='csi'){
    if(code>=0x30&&code<=0x3F){st.csiParams+=ch;return;}
    if(code>=0x20&&code<=0x2F){st.csiIntermediate+=ch;return;}
    st.escState='normal';
    handleAnsiCSI(st,st.csiParams,st.csiIntermediate,ch);
  }
}

function ansiPutChar(st,ch){
  while(st.lines.length<=st.curRow)st.lines.push([]);
  const line=st.lines[st.curRow];
  while(line.length<st.curCol)line.push({ch:' ',a:resetAttrs()});
  line[st.curCol]={ch:ch,a:copyAttrs(st.attrs)};
  st.curCol++;
}

function ansiNewLine(st){
  st.curRow++;st.curCol=0;
  while(st.lines.length<=st.curRow)st.lines.push([]);
  if(st.lines.length>2000){
    st.lines.splice(0,st.lines.length-2000);
    st.curRow=Math.max(0,st.curRow-1);
  }
}

function parseParams(raw,def){
  if(!raw)return[def];
  return raw.split(';').map(function(s){return s===''?def:parseInt(s,10);});
}

function handleAnsiCSI(st,params,inter,final){
  switch(final){
    case 'm':handleAnsiSGR(st,params);break;
    case 'H':case 'f':{
      const p=parseParams(params||'1;1',1);
      st.curRow=Math.max(0,(p[0]||1)-1);
      st.curCol=Math.max(0,(p[1]||1)-1);
      while(st.lines.length<=st.curRow)st.lines.push([]);
      break;
    }
    case 'A':{const n=parseParams(params,1)[0]||1;st.curRow=Math.max(0,st.curRow-n);break;}
    case 'B':{const n=parseParams(params,1)[0]||1;st.curRow+=n;while(st.lines.length<=st.curRow)st.lines.push([]);break;}
    case 'C':{const n=parseParams(params,1)[0]||1;st.curCol+=n;break;}
    case 'D':{const n=parseParams(params,1)[0]||1;st.curCol=Math.max(0,st.curCol-n);break;}
    case 'G':{const n=parseParams(params,1)[0]||1;st.curCol=Math.max(0,n-1);break;}
    case 'J':{
      const n=parseParams(params,0)[0];
      if(n===2||n===3){st.lines=[[]];st.curRow=0;st.curCol=0;}
      else if(n===1){for(let i=0;i<=st.curRow;i++)st.lines[i]=[];}
      else{for(let i=st.curRow;i<st.lines.length;i++)st.lines[i]=[];}
      break;
    }
    case 'K':{
      while(st.lines.length<=st.curRow)st.lines.push([]);
      const kn=parseParams(params,0)[0];
      if(kn===1){for(let c=0;c<=st.curCol&&c<st.lines[st.curRow].length;c++)st.lines[st.curRow][c]={ch:' ',a:resetAttrs()};}
      else if(kn===2){st.lines[st.curRow]=[];}
      else{st.lines[st.curRow].splice(st.curCol);}
      break;
    }
    case 's':{st.savedCursor={row:st.curRow,col:st.curCol};break;}
    case 'u':{st.curRow=st.savedCursor.row;st.curCol=st.savedCursor.col;break;}
    case 'h':case 'l':break;
    default:break;
  }
}

function handleAnsiSGR(st,params){
  const codes=parseParams(params,0);
  let i=0;
  while(i<codes.length){
    const c=codes[i++];
    if(c===0){st.attrs=resetAttrs();}
    else if(c===1) st.attrs.bold=true;
    else if(c===2) st.attrs.dim=true;
    else if(c===3) st.attrs.italic=true;
    else if(c===4) st.attrs.underline=true;
    else if(c===5||c===6) st.attrs.blink=true;
    else if(c===7) st.attrs.inverse=true;
    else if(c===9) st.attrs.strike=true;
    else if(c===22){st.attrs.bold=false;st.attrs.dim=false;}
    else if(c===23) st.attrs.italic=false;
    else if(c===24) st.attrs.underline=false;
    else if(c===25) st.attrs.blink=false;
    else if(c===27) st.attrs.inverse=false;
    else if(c===39) st.attrs.fg=null;
    else if(c>=30&&c<=37) st.attrs.fg=c-30;
    else if(c===38){
      if(codes[i]===5){i++;st.attrs.fg=codes[i++];}
      else if(codes[i]===2){i++;const r=codes[i++],g=codes[i++],b=codes[i++];st.attrs.fg='rgb('+r+','+g+','+b+')';}
    }
    else if(c>=40&&c<=47) st.attrs.bg=c-40;
    else if(c===48){
      if(codes[i]===5){i++;st.attrs.bg=codes[i++];}
      else if(codes[i]===2){i++;const r=codes[i++],g=codes[i++],b=codes[i++];st.attrs.bg='rgb('+r+','+g+','+b+')';}
    }
    else if(c===49) st.attrs.bg=null;
    else if(c>=90&&c<=97)   st.attrs.fg=c-90+8;
    else if(c>=100&&c<=107) st.attrs.bg=c-100+8;
  }
}

// ── Input history ─────────────────────────────────────────────────────────
let inputHistory = [];
let historyIdx   = -1;   // -1 = not browsing; ≥0 = index into inputHistory
let savedInput   = '';   // snapshot of inputBuffer before history browsing

function historyUp() {
  if (inputHistory.length === 0) return;
  if (historyIdx === -1) { savedInput = inputBuffer; historyIdx = inputHistory.length - 1; }
  else if (historyIdx > 0) { historyIdx--; }
  inputBuffer = inputHistory[historyIdx];
  ghost.value = inputBuffer;
  updateInputDisp();
  ghost.focus();
}

function historyDown() {
  if (historyIdx === -1) return;
  historyIdx++;
  if (historyIdx >= inputHistory.length) { historyIdx = -1; inputBuffer = savedInput; }
  else { inputBuffer = inputHistory[historyIdx]; }
  ghost.value = inputBuffer;
  updateInputDisp();
  ghost.focus();
}

// ── Thinking timer ────────────────────────────────────────────────────────
let thinkingTimerHandle = null;
let thinkingStartMs = 0;
const thinkingTimerEl = document.getElementById('thinking-timer');

function startThinkingTimer() {
  thinkingStartMs = Date.now();
  thinkingTimerEl.textContent = '0s';
  if (thinkingTimerHandle) clearInterval(thinkingTimerHandle);
  thinkingTimerHandle = setInterval(function() {
    thinkingTimerEl.textContent = Math.floor((Date.now() - thinkingStartMs) / 1000) + 's';
  }, 1000);
}

function stopThinkingTimer() {
  if (thinkingTimerHandle) { clearInterval(thinkingTimerHandle); thinkingTimerHandle = null; }
  thinkingTimerEl.textContent = '';
}

}

// ── Chat state machine ─────────────────────────────────────────────────────
// IDLE     — no active response, user input ready
// THINKING — thinking-start received, animation showing
// RESPONDING — thinking-done received, AI bubble collecting output
let chatState = 'IDLE';
let currentAiBubble  = null;  // the .ai-bubble div
let currentAiAnsi    = null;  // ANSI parser state for it
let aiRenderQueued   = false;

// System bubble — collects non-response output (errors, init messages)
let sysEl            = null;  // label div (dot + first line)
let sysOutEl         = null;  // output code block div (lines 1+)

let sysRenderQueued  = false;

const bubbleRawText = new WeakMap();

  msgs.scrollTop = msgs.scrollHeight;

// ── OSC handler ───────────────────────────────────────────────────────────────
function resetToIdle(){
  stopThinkingTimer();
  if(chatState==='RESPONDING') finalizeAiBubble();
  thinkBub.style.display='none';
  if(thinkBub.parentNode===msgs) msgs.removeChild(thinkBub);
  chatState='IDLE';
  // Complete any active agent panel — all sub-agents finished
  completeAgentPanel();
}

function handleOSC(content){
  if(content==='9;thinking-start'){
    if(chatState!=='IDLE') resetToIdle(); // clear any previous stuck state
    chatState='THINKING';
    thinkBub.style.display='flex';
    msgs.appendChild(thinkBub);
    startThinkingTimer();
    scrollToBottom();
  } else if(content==='9;thinking-done'){
    stopThinkingTimer();
    thinkBub.style.display='none';
    if(thinkBub.parentNode===msgs) msgs.removeChild(thinkBub);
    if(chatState==='RESPONDING'){
      resetToIdle(); // second thinking-done = response complete, finalize bubble
    } else if(chatState==='THINKING'){
      chatState='RESPONDING';
      startAiBubble();
    }
  } else if(content.startsWith('9;rate-limit:')){
    // 429 countdown: "9;rate-limit:30" means retry in 30s
    var secs=parseInt(content.slice(13))||30;
    thinkingTimerEl.textContent='⏳ '+secs+'s';
    var cd=secs;
    var cdh=setInterval(function(){
      cd--;
      if(cd<=0){clearInterval(cdh);thinkingTimerEl.textContent='';}
      else{thinkingTimerEl.textContent='⏳ '+cd+'s';}
    },1000);
  } else if(content.startsWith('9;confirm:')){
    var rest=content.slice(10);
    var ci=rest.indexOf(':');
    if(ci!==-1) showConfirmDialog(rest.slice(0,ci), rest.slice(ci+1));
  } else if(content.startsWith('9;suggestions:')){
    try{
      var suggestions=JSON.parse(content.slice(14));
      showSuggestions(suggestions);
    }catch(_){}
  } else if(content.startsWith('9;tokens:')){
    var toks=parseInt(content.slice(9))||0;
    var tokEl=document.getElementById('token-counter');
    var barFill=document.getElementById('ctx-bar-fill');
    if(tokEl&&toks>0){
      tokEl.textContent='~'+formatTokens(toks)+' tokens';
      var pct=Math.min(100,Math.round(toks/2000)); // 200K limit → 100%
      if(toks>180000){ tokEl.className='crit'; }
      else if(toks>120000){ tokEl.className='warn'; }
      else { tokEl.className=''; }
      if(barFill){
        barFill.style.width=pct+'%';
        barFill.style.background=toks>180000?'rgba(255,80,80,0.8)':toks>120000?'rgba(255,160,60,0.6)':'rgba(232,131,74,0.5)';
      }
    }
  } else if(content.startsWith('9;agentic:')){
    var agOn=content.slice(10)==='on';
    var badge=document.getElementById('agentic-badge');
    if(badge) badge.style.display=agOn?'block':'none';
  } else if(content.startsWith('9;think-block:')){
    var enc=content.slice(14);
    var thinkText='';
    try{ thinkText=atob(enc); }catch(_){}
    if(thinkText&&currentAiBubble){
      var det=document.createElement('details');
      det.className='thinking-details';
      var sum=document.createElement('summary');
      sum.textContent='💭 Extended thinking';
      var body=document.createElement('div');
      body.className='think-body';
      body.textContent=thinkText;
      det.appendChild(sum);
      det.appendChild(body);
      currentAiBubble.insertBefore(det,currentAiBubble.firstChild);
      scrollToBottom();
    }
  } else if(content.startsWith('9;permission:')){
    var permB64=content.slice(13);
    var perm={toolName:'tool',toolInput:{},id:Date.now()};
    try{ perm=JSON.parse(atob(permB64)); }catch(_){}
    // Agent/Task tool: show animated sub-agent panel instead of permission card
    if(perm.toolName==='Agent'||perm.toolName==='Task'){
      showAgentPanel(perm);
    } else {
      showPermissionDialog(perm);
    }
  } else if(content.startsWith('9;mcp-ready:')){
    try{
      var mcpServers=JSON.parse(atob(content.slice(12)));
      var mcpTotal=mcpServers.reduce(function(s,srv){return s+(srv.tools?srv.tools.length:0);},0);
      var mcpChip=document.getElementById('mcp-chip');
      if(mcpChip){
        mcpChip.textContent='MCP ● '+mcpTotal;
        mcpChip.style.display=mcpTotal>0?'block':'none';
        mcpChip._mcpData=mcpServers;
      }
    }catch(_){}
  } else if(content==='9;clear-ui'){
    // !clear: wipe all chat bubbles from the UI and reset to idle state
    resetToIdle();
    msgs.innerHTML='';
    msgs.appendChild(thinkBub);
    sysEl=null; sysOutEl=null; sysAnsi=makeAnsiState();
    currentAiBubble=null; currentAiAnsi=null;
  } else if(content.startsWith('9;cwd:')){
    var cwd=content.slice(6);
    var cwdBar=document.getElementById('cwd-bar');
    if(cwdBar){
      // Abbreviate long paths: keep last 2 path segments visible
      var display=cwd;
      var parts=cwd.replace(/\/+$/,'').split('/').filter(Boolean);
      if(parts.length>3) display='…/'+parts.slice(-2).join('/');
      cwdBar.textContent='📂 '+display;
      cwdBar.style.display='block';
    }
  }
}

// ── Markdown renderer ─────────────────────────────────────────────────────────
let rawAiText='';

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function highlightCode(code,lang){
  const kw={
    javascript:'\\b(const|let|var|function|return|if|else|for|while|class|import|export|from|async|await|new|this|typeof|null|undefined|true|false|throw|try|catch|finally|of|do|switch|case|break|continue|delete|in|instanceof)\\b',
    python:'\\b(def|class|import|from|return|if|elif|else|for|while|in|not|and|or|True|False|None|with|as|try|except|finally|lambda|yield|pass|break|continue|raise|global|nonlocal|del|assert|is)\\b',
    kotlin:'\\b(fun|val|var|class|object|interface|return|if|else|when|for|while|in|is|as|null|true|false|override|private|public|protected|internal|suspend|data|sealed|companion|import|package|by|init|constructor|this|super|throw|try|catch|finally|operator|inline|reified|crossinline|noinline|typealias|enum|annotation|abstract|open|final|lateinit)\\b',
    java:'\\b(class|interface|return|if|else|for|while|new|public|private|protected|static|final|void|null|true|false|import|package|extends|implements|throws|throw|try|catch|finally|this|super|abstract|synchronized|volatile|transient|instanceof|enum|int|long|double|float|boolean|char|byte|short)\\b',
    bash:'\\b(if|then|else|elif|fi|for|while|do|done|in|case|esac|function|return|export|echo|read|exit|source|alias|unset|local|declare|shift|break|continue)\\b',
  };
  const pat=kw[lang]||kw['javascript'];
  code=code.replace(new RegExp(pat,'g'),'<span class="hl-kw">$1</span>');
  code=code.replace(/(&#34;(?:[^\\&#]|\\.)*?&#34;|&#39;(?:[^\\&#]|\\.)*?&#39;)/g,'<span class="hl-str">$1</span>');
  code=code.replace(/(\/\/[^\n]*|#[^\n]*)/g,'<span class="hl-comment">$1</span>');
  return code;
}

function renderInline(t){
  // Inline math $...$ (avoid matching $$ which is handled as block)
  t=t.replace(/(?<!\$)\$(?!\$)([^$\n]+?)\$(?!\$)/g,function(_,expr){return renderMath(expr,false);});
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/__(.+?)__/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  t=t.replace(/`([^`\n]+?)`/g,'<code class="md-inline-code">$1</code>');
  return t;
}

function parseTableRow(line){
  const parts=line.split('|');
  return parts.slice(1,parts.length-1).map(function(s){return s.trim();});
}

// ── Sub-agent animated panel ──────────────────────────────────────────────────
var agentPanelEl   = null;  // current panel DOM element
var agentNodeStates= [];    // 'running' | 'done' per spawned agent

// Node layout: orchestrator at center, up to 3 sub-agents around it
var AGENT_POS = [
  {cx:26, cy:26, grad:'subGrad1_ap'},  // top-left
  {cx:76, cy:26, grad:'subGrad2_ap'},  // top-right
  {cx:50, cy:78, grad:'subGrad3_ap'},  // bottom
];

function buildAgentSvg(states) {
  var ns='http://www.w3.org/2000/svg';
  var orch={cx:50,cy:46};
  var visible=Math.min(states.length, 3);
  var queued =Math.max(0, states.length - 3);

  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('xmlns',ns);
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('width','130');
  svg.setAttribute('height','130');

  var defs=document.createElementNS(ns,'defs');
  // Gradients
  var grads=[
    {id:'apPG',  c1:'#f0a070',c2:'#E8834A'},
    {id:'apSGdone',    c1:'#3DD68C',c2:'#15a05a'},
    {id:'apSGrunning', c1:'#60A5FA',c2:'#2563eb'},
    {id:'apSGqueued',  c1:'#FBBF24',c2:'#d97706'},
  ];
  grads.forEach(function(g){
    var lg=document.createElementNS(ns,'linearGradient');
    lg.id=g.id; lg.setAttribute('x1','0%'); lg.setAttribute('y1','0%');
    lg.setAttribute('x2','100%'); lg.setAttribute('y2','100%');
    var s1=document.createElementNS(ns,'stop');
    s1.setAttribute('offset','0%'); s1.style.stopColor=g.c1;
    var s2=document.createElementNS(ns,'stop');
    s2.setAttribute('offset','100%'); s2.style.stopColor=g.c2;
    lg.appendChild(s1); lg.appendChild(s2);
    defs.appendChild(lg);
  });
  // Filters
  [['apFP','3.5'],['apFS','2.5'],['apFL','1.5'],['apFPkt','2']].forEach(function(f){
    var fi=document.createElementNS(ns,'filter');
    fi.id=f[0]; fi.setAttribute('x','-60%'); fi.setAttribute('y','-60%');
    fi.setAttribute('width','220%'); fi.setAttribute('height','220%');
    var blur=document.createElementNS(ns,'feGaussianBlur');
    blur.setAttribute('stdDeviation',f[1]); blur.setAttribute('result','b');
    var merge=document.createElementNS(ns,'feMerge');
    var mn1=document.createElementNS(ns,'feMergeNode'); mn1.setAttribute('in','b');
    var mn2=document.createElementNS(ns,'feMergeNode'); mn2.setAttribute('in','SourceGraphic');
    merge.appendChild(mn1); merge.appendChild(mn2);
    fi.appendChild(blur); fi.appendChild(merge);
    defs.appendChild(fi);
  });
  svg.appendChild(defs);

  // Background
  var bg=document.createElementNS(ns,'rect');
  bg.setAttribute('width','100'); bg.setAttribute('height','100');
  bg.setAttribute('rx','20'); bg.setAttribute('fill','rgba(21,21,24,0.85)');
  svg.appendChild(bg);

  // Sub-agent nodes
  for(var i=0;i<visible;i++){
    var pos=AGENT_POS[i];
    var state=states[i]||'running';
    // Color by state: running=blue, done=green, queued=amber
    var col = state==='done' ? '#3DD68C' : state==='running' ? '#60A5FA' : '#FBBF24';
    var gradId = state==='done' ? 'apSGdone' : state==='running' ? 'apSGrunning' : 'apSGqueued';

    // Connection line orch→node
    var line=document.createElementNS(ns,'line');
    line.setAttribute('x1',orch.cx); line.setAttribute('y1',orch.cy);
    line.setAttribute('x2',pos.cx);  line.setAttribute('y2',pos.cy);
    line.setAttribute('stroke','#E8834A'); line.setAttribute('stroke-width','1.2');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('filter','url(#apFL)');
    if(state==='done'){
      line.style.animation='ap-line-d 4s ease-in-out infinite';
      line.setAttribute('opacity','0.55');
    } else if(state==='running'){
      line.style.animation='ap-line-r 2s ease-in-out infinite';
      line.setAttribute('opacity','0.35');
    } else {
      line.style.animation='ap-line-q 2.8s ease-in-out infinite';
      line.setAttribute('opacity','0.18');
    }
    svg.appendChild(line);

    // Packet
    var pkt=document.createElementNS(ns,'circle');
    pkt.setAttribute('cx',pos.cx); pkt.setAttribute('cy',pos.cy);
    pkt.setAttribute('r','2');
    pkt.setAttribute('fill',col);
    pkt.setAttribute('filter','url(#apFPkt)');
    if(state==='done'){
      pkt.style.animation='ap-pkt-d 1.5s ease-out forwards 0.1s';
      pkt.setAttribute('opacity','0');
    } else if(state==='running'){
      // pkt animates between orch and node positions
      var kf=[
        {offset:0,    cx:orch.cx, cy:orch.cy, opacity:0},
        {offset:0.05, cx:orch.cx, cy:orch.cy, opacity:1},
        {offset:0.45, cx:pos.cx,  cy:pos.cy,  opacity:1},
        {offset:0.50, cx:pos.cx,  cy:pos.cy,  opacity:0},
        {offset:0.56, cx:pos.cx,  cy:pos.cy,  opacity:0.8},
        {offset:0.95, cx:orch.cx, cy:orch.cy, opacity:0.8},
        {offset:1,    cx:orch.cx, cy:orch.cy, opacity:0},
      ];
      // Use SMIL animate elements for cx/cy since CSS can't animate SVG attrs
      ['cx','cy','opacity'].forEach(function(attr){
        var anim=document.createElementNS(ns,'animate');
        anim.setAttribute('attributeName',attr);
        anim.setAttribute('values', kf.map(function(k){return k[attr];}).join(';'));
        anim.setAttribute('keyTimes', kf.map(function(k){return k.offset;}).join(';'));
        anim.setAttribute('dur','2s');
        anim.setAttribute('calcMode','spline');
        anim.setAttribute('keySplines', kf.slice(0,-1).map(function(){return '0.4 0 0.6 1';}).join(';'));
        anim.setAttribute('repeatCount','indefinite');
        pkt.appendChild(anim);
      });
      pkt.setAttribute('opacity','0');
    } else {
      pkt.setAttribute('cx',String((orch.cx+pos.cx)/2));
      pkt.setAttribute('cy',String((orch.cy+pos.cy)/2));
      pkt.style.animation='ap-pkt-q 2.8s ease-in-out infinite';
      pkt.setAttribute('opacity','0.55');
    }
    svg.appendChild(pkt);

    // Node group
    var ng=document.createElementNS(ns,'g');
    if(state==='done')       ng.style.animation='ap-glow-g 4s ease-in-out infinite';
    else if(state==='running') ng.style.animation='ap-glow-b 2s ease-in-out infinite';
    else                     ng.style.animation='ap-glow-o 3.5s ease-in-out infinite';

    var nc=document.createElementNS(ns,'circle');
    nc.setAttribute('cx',pos.cx); nc.setAttribute('cy',pos.cy);
    nc.setAttribute('r','10');
    nc.setAttribute('fill','url(#'+gradId+')');
    nc.setAttribute('filter','url(#apFS)');
    nc.setAttribute('opacity','0.95');
    ng.appendChild(nc);

    var nb=document.createElementNS(ns,'circle');
    nb.setAttribute('cx',pos.cx); nb.setAttribute('cy',pos.cy);
    nb.setAttribute('r','10'); nb.setAttribute('fill','none');
    nb.setAttribute('stroke',col); nb.setAttribute('stroke-width','1');
    nb.setAttribute('opacity','0.4');
    ng.appendChild(nb);

    if(state==='done'){
      // Checkmark draw-in
      var dx=pos.cx-26, dy=pos.cy-26;
      var ck=document.createElementNS(ns,'path');
      ck.setAttribute('d','M'+(21.5+dx)+','+(26+dy)+' L'+(24.5+dx)+','+(29.5+dy)+' L'+(31+dx)+','+(22+dy));
      ck.setAttribute('fill','none'); ck.setAttribute('stroke','white');
      ck.setAttribute('stroke-width','2'); ck.setAttribute('stroke-linecap','round');
      ck.setAttribute('stroke-linejoin','round');
      ck.setAttribute('stroke-dasharray','14');
      ck.style.animation='ap-check 1.8s ease-out forwards 0.2s';
      ng.appendChild(ck);
    } else if(state==='running'){
      // Spinning arc
      var ag=document.createElementNS(ns,'g');
      ag.style.transformOrigin=pos.cx+'px '+pos.cy+'px';
      ag.style.animation='ap-spin 1.8s linear infinite';
      var arc=document.createElementNS(ns,'path');
      arc.setAttribute('d','M'+pos.cx+','+(pos.cy-9)+' A9,9 0 0,0 '+(pos.cx-9)+','+pos.cy);
      arc.setAttribute('fill','none'); arc.setAttribute('stroke','white');
      arc.setAttribute('stroke-width','2'); arc.setAttribute('stroke-linecap','round');
      arc.setAttribute('opacity','0.6');
      ag.appendChild(arc);
      ng.appendChild(ag);
    } else {
      // Static arc (queued)
      var qa=document.createElementNS(ns,'path');
      qa.setAttribute('d','M'+pos.cx+','+(pos.cy-9)+' A9,9 0 0,1 '+(pos.cx+9)+','+pos.cy);
      qa.setAttribute('fill','none'); qa.setAttribute('stroke','white');
      qa.setAttribute('stroke-width','2'); qa.setAttribute('stroke-linecap','round');
      qa.style.animation='ap-arc-q 3.5s ease-in-out infinite';
      qa.setAttribute('opacity','0.25');
      ng.appendChild(qa);
      // Waiting dots
      [-4,0,4].forEach(function(dx2,di){
        var dot=document.createElementNS(ns,'circle');
        dot.setAttribute('cx',String(pos.cx+dx2)); dot.setAttribute('cy',String(pos.cy));
        dot.setAttribute('r','1.2'); dot.setAttribute('fill','white');
        var da=document.createElementNS(ns,'animate');
        da.setAttribute('attributeName','opacity');
        da.setAttribute('values','0.3;0.9;0.3');
        da.setAttribute('dur','1.4s');
        da.setAttribute('begin',String(di*0.22)+'s');
        da.setAttribute('repeatCount','indefinite');
        dot.appendChild(da);
        ng.appendChild(dot);
      });
    }

    // Center dot
    var cd=document.createElementNS(ns,'circle');
    cd.setAttribute('cx',pos.cx); cd.setAttribute('cy',pos.cy);
    cd.setAttribute('r','3'); cd.setAttribute('fill','white'); cd.setAttribute('opacity','0.9');
    ng.appendChild(cd);
    svg.appendChild(ng);
  }

  // Queued overflow badge (if >3 agents)
  if(queued>0){
    var qbg=document.createElementNS(ns,'rect');
    qbg.setAttribute('x','72'); qbg.setAttribute('y','80');
    qbg.setAttribute('width','24'); qbg.setAttribute('height','14');
    qbg.setAttribute('rx','7');
    qbg.setAttribute('fill','rgba(251,146,60,0.2)');
    qbg.setAttribute('stroke','rgba(251,146,60,0.4)');
    qbg.setAttribute('stroke-width','0.8');
    svg.appendChild(qbg);
    var qt=document.createElementNS(ns,'text');
    qt.setAttribute('x','84'); qt.setAttribute('y','90');
    qt.setAttribute('text-anchor','middle');
    qt.setAttribute('font-size','8');
    qt.setAttribute('fill','#fb923c');
    qt.setAttribute('font-family','monospace');
    qt.textContent='+'+queued+' queued';
    svg.appendChild(qt);
  }

  // Orchestrator pulse rings
  var pr1=document.createElementNS(ns,'circle');
  pr1.setAttribute('cx',orch.cx); pr1.setAttribute('cy',orch.cy);
  pr1.setAttribute('r','13'); pr1.setAttribute('fill','none');
  pr1.setAttribute('stroke','#E8834A'); pr1.setAttribute('stroke-width','1.2');
  pr1.style.animation='ap-pulse1 2.2s ease-out infinite';
  svg.appendChild(pr1);

  var pr2=document.createElementNS(ns,'circle');
  pr2.setAttribute('cx',orch.cx); pr2.setAttribute('cy',orch.cy);
  pr2.setAttribute('r','13'); pr2.setAttribute('fill','none');
  pr2.setAttribute('stroke','#E8834A'); pr2.setAttribute('stroke-width','1');
  pr2.style.animation='ap-pulse2 2.2s ease-out 0.75s infinite';
  svg.appendChild(pr2);

  // Orchestrator ambient halos
  [0.12,0.1].forEach(function(op,hi){
    var h=document.createElementNS(ns,'circle');
    h.setAttribute('cx',orch.cx); h.setAttribute('cy',orch.cy);
    h.setAttribute('r',hi===0?'16':'13'); h.setAttribute('fill','#E8834A');
    h.setAttribute('opacity',String(op));
    svg.appendChild(h);
  });

  // Orchestrator main node
  var og=document.createElementNS(ns,'g');
  og.style.animation='ap-orch 3s ease-in-out infinite';
  var oc=document.createElementNS(ns,'circle');
  oc.setAttribute('cx',orch.cx); oc.setAttribute('cy',orch.cy);
  oc.setAttribute('r','11');
  oc.setAttribute('fill','url(#apPG)');
  oc.setAttribute('filter','url(#apFP)');
  og.appendChild(oc);
  var ob=document.createElementNS(ns,'circle');
  ob.setAttribute('cx',orch.cx); ob.setAttribute('cy',orch.cy);
  ob.setAttribute('r','11'); ob.setAttribute('fill','none');
  ob.setAttribute('stroke','#f0a070'); ob.setAttribute('stroke-width','1');
  ob.setAttribute('opacity','0.5');
  og.appendChild(ob);
  // Diamond gem
  var gem=document.createElementNS(ns,'polygon');
  gem.setAttribute('points',orch.cx+','+(orch.cy-7)+' '+(orch.cx+5)+','+(orch.cy-1)+' '+orch.cx+','+(orch.cy+6)+' '+(orch.cx-5)+','+(orch.cy-1));
  gem.setAttribute('fill','white'); gem.setAttribute('opacity','0.95');
  og.appendChild(gem);
  var gl=document.createElementNS(ns,'line');
  gl.setAttribute('x1',String(orch.cx-5)); gl.setAttribute('y1',String(orch.cy-1));
  gl.setAttribute('x2',String(orch.cx+5)); gl.setAttribute('y2',String(orch.cy-1));
  gl.setAttribute('stroke','#E8834A'); gl.setAttribute('stroke-width','1'); gl.setAttribute('opacity','0.5');
  og.appendChild(gl);
  svg.appendChild(og);

  // Outer border
  var border=document.createElementNS(ns,'rect');
  border.setAttribute('width','100'); border.setAttribute('height','100');
  border.setAttribute('rx','20'); border.setAttribute('fill','none');
  border.setAttribute('stroke','#E8834A'); border.setAttribute('stroke-width','1');
  border.setAttribute('opacity','0.2');
  svg.appendChild(border);

  return svg;
}

function getAgentPanel(){
  if(!agentPanelEl || !agentPanelEl.parentNode){
    agentPanelEl=document.createElement('div');
    agentPanelEl.className='agent-panel';
    agentNodeStates=[];
    msgs.appendChild(agentPanelEl);
    scrollToBottom();
  }
  return agentPanelEl;
}

function showAgentPanel(perm){
  agentNodeStates.push('running');
  var panel=getAgentPanel();
  panel.innerHTML='';

  var hdr=document.createElement('div');
  hdr.className='agent-panel-header';
  var dot=document.createElement('span');
  dot.textContent='⬡';
  dot.style.cssText='color:#E8834A;font-size:13px;';
  var title=document.createElement('span');
  title.className='agent-panel-title';
  title.textContent='Sub-agents running';
  var count=document.createElement('span');
  count.className='agent-panel-count';
  count.textContent=agentNodeStates.length+' agent'+(agentNodeStates.length>1?'s':'');
  hdr.appendChild(dot); hdr.appendChild(title); hdr.appendChild(count);
  panel.appendChild(hdr);

  // Task description
  var desc=perm.toolInput&&(perm.toolInput.description||perm.toolInput.prompt||'');
  if(desc){
    var d=document.createElement('div');
    d.className='agent-panel-desc';
    d.textContent=String(desc).slice(0,80);
    panel.appendChild(d);
  }

  panel.appendChild(buildAgentSvg(agentNodeStates));
  scrollToBottom();
}

function completeAgentPanel(){
  if(!agentPanelEl||!agentPanelEl.parentNode) return;
  agentNodeStates=agentNodeStates.map(function(){return 'done';});
  var panel=agentPanelEl;
  panel.innerHTML='';

  var hdr=document.createElement('div');
  hdr.className='agent-panel-header';
  var dot=document.createElement('span');
  dot.textContent='✦';
  dot.style.cssText='color:#34d399;font-size:13px;';
  var title=document.createElement('span');
  title.className='agent-panel-title';
  title.style.color='#86efac';
  title.textContent='Agents completed';
  var count=document.createElement('span');
  count.className='agent-panel-count';
  count.textContent=agentNodeStates.length+' done';
  hdr.appendChild(dot); hdr.appendChild(title); hdr.appendChild(count);
  panel.appendChild(hdr);
  panel.appendChild(buildAgentSvg(agentNodeStates));

  // Fade and remove after 3s
  setTimeout(function(){
    panel.style.transition='opacity 0.8s';
    panel.style.opacity='0';
    setTimeout(function(){ if(panel.parentNode) panel.parentNode.removeChild(panel); }, 900);
    agentPanelEl=null;
    agentNodeStates=[];
  }, 3000);
}

// ── Follow-up suggestions ─────────────────────────────────────────────────────
function showSuggestions(suggestions){
  var old=document.getElementById('suggestions-bar');
  if(old)old.remove();
  var bar=document.createElement('div');
  bar.id='suggestions-bar';
  bar.style.cssText='display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px 4px;';
  suggestions.forEach(function(q){
    var chip=document.createElement('button');
    chip.textContent=q;
    chip.style.cssText='background:rgba(232,131,74,0.15);border:1px solid rgba(232,131,74,0.35);border-radius:16px;color:#E8834A;font-size:11px;font-family:Space Mono,monospace;padding:5px 12px;cursor:pointer;text-align:left;';
    chip.addEventListener('click',function(){
      bar.remove();
      submitLine(q);
    });
    bar.appendChild(chip);
  });
  msgs.appendChild(bar);
  scrollToBottom();
}

// ── Mermaid rendering ─────────────────────────────────────────────────────
var mermaidCounter=0;
function renderMermaidBlock(code){
  var id='mmd-'+(++mermaidCounter);
  var wrap='<div class="md-mermaid" id="'+id+'">'+escHtml(code)+'</div>';
  // Defer render until after DOM insertion
  requestAnimationFrame(function(){
    var el=document.getElementById(id);
    if(!el) return;
    if(typeof mermaid==='undefined') return; // CDN not loaded yet (offline)
    try{
      mermaid.render('mmd-svg-'+mermaidCounter, el.textContent, function(svg){el.innerHTML=svg;});
    }catch(_){} // leave as text if mermaid fails
  });
  return wrap;
}

// ── KaTeX math rendering ──────────────────────────────────────────────────
function renderMath(expr, display){
  if(typeof katex==='undefined') return (display?'$$':'$')+escHtml(expr)+(display?'$$':'$');
  try{ return katex.renderToString(expr,{displayMode:display,throwOnError:false}); }
  catch(_){ return escHtml(expr); }
}

function renderMarkdown(raw){
  const text=raw.replace(/\x1b\[[0-9;]*[mA-Za-z]/g,'').replace(/\x1b\][^\x07]*\x07/g,'');
  const lines=text.split('\n');
  let html='';let i=0;
  while(i<lines.length){
    const line=lines[i];
    // Fenced code block
    if(/^```/.test(line)){
      const meta=line.slice(3).trim();
      const parts=meta.split(/\s+/);
      const lang=(parts[0]||'').toLowerCase();
      let code='';i++;
      while(i<lines.length&&!/^```/.test(lines[i])){code+=lines[i]+'\n';i++;}
      i++;
      // Mermaid diagram — render as diagram, not code
      if(lang==='mermaid'){html+=renderMermaidBlock(code.trimEnd());continue;}
      // Filename hint: ```lang filename.ext or ```filename.ext
      const hasExt=function(s){return/\.[a-zA-Z0-9]{1,6}$/.test(s);};
      let fname=parts.length>1&&hasExt(parts[1])?parts[1]:
                parts.length===1&&hasExt(parts[0])&&parts[0].indexOf('/')===-1?parts[0]:'';
      const codeEsc=highlightCode(escHtml(code.trimEnd()),lang);
      const saveBtn=fname?'<button class="code-copy-btn" style="right:52px" onclick="saveCode(this,\''+escHtml(fname)+'\')">Save</button>':'';
      const isRunnable=['bash','sh','shell','javascript','js','python','py','node'].includes(lang);
      const runBtn=isRunnable?'<button class="code-copy-btn run-btn" style="right:'+(fname?'98px':'52px')+';background:rgba(0,200,100,0.2);border-color:rgba(0,200,100,0.4);color:#86efac;" onclick="runCodeBlock(this)" data-code="'+escHtml(code.trimEnd())+'" data-lang="'+lang+'">▶ Run</button>':'';
      html+='<div class="code-wrap">'+runBtn+saveBtn+'<button class="code-copy-btn" onclick="copyCode(this)">Copy</button>' +
            '<pre class="md-code"><code data-raw="'+escHtml(code.trimEnd())+'">'+codeEsc+'</code></pre></div>';
      continue;
    }
    // Display math block $$...$$
    if(line.trim()==='$$'){
      let mathExpr='';i++;
      while(i<lines.length&&lines[i].trim()!=='$$'){mathExpr+=lines[i]+'\n';i++;}
      i++;
      html+='<div style="margin:6px 0;overflow-x:auto;">'+renderMath(mathExpr.trim(),true)+'</div>';
      continue;
    }
    // Table
    if(line.indexOf('|')!==-1&&i+1<lines.length&&/^[\s|:+-]+$/.test(lines[i+1])){
      const headers=parseTableRow(line);i+=2;
      let rows=[];
      while(i<lines.length&&lines[i].indexOf('|')!==-1){rows.push(parseTableRow(lines[i]));i++;}
      html+='<table class="md-table"><thead><tr>'+headers.map(function(h){return'<th>'+renderInline(escHtml(h))+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(r){return'<tr>'+r.map(function(c){return'<td>'+renderInline(escHtml(c))+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';
      continue;
    }
    // Headings
    if(/^### /.test(line)){html+='<div class="md-h3">'+renderInline(escHtml(line.slice(4)))+'</div>';i++;continue;}
    if(/^## /.test(line)){html+='<div class="md-h2">'+renderInline(escHtml(line.slice(3)))+'</div>';i++;continue;}
    if(/^# /.test(line)){html+='<div class="md-h1">'+renderInline(escHtml(line.slice(2)))+'</div>';i++;continue;}
    // List items
    if(/^[-*] /.test(line)){html+='<div class="md-li">• '+renderInline(escHtml(line.slice(2)))+'</div>';i++;continue;}
    if(/^\d+\. /.test(line)){const m=line.match(/^(\d+)\. (.*)/);html+='<div class="md-li">'+m[1]+'. '+renderInline(escHtml(m[2]))+'</div>';i++;continue;}
    // Blank line = spacer
    if(line.trim()===''){html+='<div style="height:6px"></div>';i++;continue;}
    // Normal line
    html+='<div>'+renderInline(escHtml(line))+'</div>';i++;
  }
  return html;
}

function hasMarkdownStructures(text){
  return text.indexOf('```')!==-1||/\|.*\|/.test(text)||text.indexOf('**')!==-1||
         /^#{1,3} /m.test(text)||/^[-*] /m.test(text)||
         text.indexOf('$$')!==-1||/\$[^$\n]+\$/.test(text);
}

// Extract the AI's actual response text from a full PTY/TUI stream.
// Claude Code's TUI marks each AI turn with ✦ on its own line.
// We strip all ANSI escape sequences then pull everything after the last ✦
// up to the input prompt (❯), discarding the surrounding TUI chrome.
function extractResponseFromPty(raw){
  // Strip all ANSI/VT escape sequences
  var stripped=raw
    .replace(/\x1b\[[0-9;?]*[A-Za-z]/g,'')
    .replace(/\x1b\][^\x07]*\x07/g,'')
    .replace(/\x1b[^[\]]/g,'')
    .replace(/\r\n/g,'\n')
    .replace(/\r/g,'\n');
  // M3: use lastIndexOf so that ✦ appearing inside AI output doesn't cause a wrong slice.
  var idx=stripped.lastIndexOf('✦'); // ✦
  if(idx===-1) return null;
  var text=stripped.slice(idx+1);
  // M3: sanity check — if the extracted text is unreasonably long we likely hit
  // the wrong marker; fall back to returning null so caller uses raw text.
  if(text.length>50000) return null;
  // Trim off the input prompt and anything after it
  var promptMatch=text.search(/\n\s*[❯>]\s*\n?$/m);
  if(promptMatch!==-1) text=text.slice(0,promptMatch);
  // Remove leading provider label (e.g. " openrouter\n") that sometimes follows ✦
  text=text.replace(/^\s*\S+\s*\n/,'');
  return text.trim()||null;
}

function startAiBubble(){

let aiBubbleHasContent=false;

function renderAiBubble(){
  if(!currentAiBubble||!currentAiAnsi) return;
  const html=linesToHtml(currentAiAnsi.lines);
  if(!html.trim()) return;  // keep loader visible until real content arrives
  if(!aiBubbleHasContent){
    aiBubbleHasContent=true;
    currentAiBubble.innerHTML='';  // remove loader
  }
  currentAiBubble.innerHTML=html;
  scrollToBottom();
}

function scheduleAiRender(){
  if(aiRenderQueued) return;
  aiRenderQueued=true;
  requestAnimationFrame(function(){aiRenderQueued=false;renderAiBubble();});
}

function finalizeAiBubble(){
  if(currentAiBubble){
    // PTY/TUI mode: rawAiText is a full terminal screen dump containing TUI chrome.
    // Extract just the AI response text using the ✦ turn marker.
    // Strip OSC sequences — coalesced chunks can include thinking-done + error
    // text that would otherwise appear inside the AI bubble.
    var displayText=rawAiText.replace(/\x1b][^\x07]*\x07/g,'');
    if(displayText.indexOf('✦')!==-1){ // ✦
      var extracted=extractResponseFromPty(rawAiText);
      if(extracted) displayText=extracted;
    }
    if(hasMarkdownStructures(displayText)){
      currentAiBubble.innerHTML=renderMarkdown(displayText);
    } else if(displayText.trim()){
      // Strip any residual ANSI colour codes then render as plain text
      var plain=displayText.replace(/\x1b\[[0-9;]*[mA-Za-z]/g,'');
      if(hasMarkdownStructures(plain)){
        currentAiBubble.innerHTML=renderMarkdown(plain);
      } else {
        // Fall back to ANSI screen render only when no ✦ extraction was possible
        renderAiBubble();
      }
    } else {
      // no content ever arrived — remove the bubble entirely
      const row=currentAiBubble.parentElement;
      if(row) row.remove();
    }
    // Store raw text so copy button can access it after rawAiText is cleared
    // L6: use WeakMap instead of expando DOM property to avoid memory leaks.
    bubbleRawText.set(currentAiBubble, displayText);
    // Reveal action footer at bottom of bubble
    const actFooter=currentAiBubble.querySelector('.bubble-act-footer');
    if(actFooter) actFooter.style.display='flex';
    // TTS: speak the response
    if(typeof Android!=='undefined'&&displayText.trim()){
      const ttsText=displayText.replace(/\x1b\[[0-9;]*m/g,'').replace(/```[\s\S]*?```/g,'[code block]').replace(/[*_#`]/g,'').trim().slice(0,500);
      if(ttsText) Android.speakText(ttsText);
    }
    // If Claude ended with a question / action-request, show Yes/No quick-reply chips
    maybeShowYesNo(displayText);
    scrollToBottom();
  }
  rawAiText='';
  currentAiBubble=null;
  currentAiAnsi=null;
  aiBubbleHasContent=false;
  chatState='IDLE';
}

// Show quick-reply chips when Claude asks for confirmation.
// Guardian prompt "Proceed?" → No / Yes / Always (full words so Claude reads them in context).
// General yes/no questions → No / Yes.
function maybeShowYesNo(text){
  var old=document.getElementById('yn-bar');
  if(old)old.remove();
  var plain=text.replace(/\x1b\[[0-9;]*[mA-Za-z]/g,'').trim();
  if(!plain) return;
  var endsQ=/[?？]\s*$/.test(plain);
  var hasIntent=/\b(shall i|should i|would you like|do you want|do you need|want me to|let me know if|proceed\b|confirm\b|run this|execute this|apply this|overwrite|delete this|install this|go ahead)\b/i.test(plain);
  if(!endsQ && !hasIntent) return;

  // Guardian "Proceed?" → 3 chips with Always option
  var isGuardian=/\bproceed\b/i.test(plain);
  var chips=isGuardian
    ? [['No','No','rgba(239,68,68,0.15)','rgba(239,68,68,0.35)','#f87171'],
       ['Yes','Yes','rgba(34,197,94,0.12)','rgba(34,197,94,0.35)','#86efac'],
       ['Always','Always','rgba(251,191,36,0.12)','rgba(251,191,36,0.35)','#fcd34d']]
    : [['No','No','rgba(239,68,68,0.15)','rgba(239,68,68,0.35)','#f87171'],
       ['Yes','Yes','rgba(34,197,94,0.12)','rgba(34,197,94,0.35)','#86efac']];

  var bar=document.createElement('div');
  bar.id='yn-bar';
  bar.style.cssText='display:flex;gap:8px;padding:6px 12px 2px;flex-wrap:wrap;';
  chips.forEach(function(c){
    var btn=document.createElement('button');
    btn.textContent=c[0];
    btn.style.cssText='background:'+c[2]+';border:1px solid '+c[3]+';border-radius:14px;color:'+c[4]+';font-size:11px;font-family:Space Mono,monospace;padding:4px 14px;cursor:pointer;';
    btn.addEventListener('click',function(){
      bar.remove();
      submitLine(c[1]);
    });
    bar.appendChild(btn);
  });
  msgs.appendChild(bar);
  scrollToBottom();
}

function getSysBubble(){
  if(!sysEl){
    const row=document.createElement('div');
    row.className='msg-row sys-row';

    const out=document.createElement('div');
    out.className='sys-output';
    row.appendChild(label);
    row.appendChild(out);
    msgs.appendChild(row);
    sysEl=label;
    sysOutEl=out;
  }
  return sysEl;
}

function scheduleSysRender(){
  if(sysRenderQueued) return;
  sysRenderQueued=true;
  requestAnimationFrame(function(){
    sysRenderQueued=false;
    if(sysEl&&sysAnsi){
      const lines=sysAnsi.lines;
      if(lines.length<=1){
        sysEl.innerHTML=linesToHtml(lines);
        if(sysOutEl) sysOutEl.style.display='none';
      } else {
        sysEl.innerHTML=linesToHtml([lines[0]]);
        if(sysOutEl){
          sysOutEl.innerHTML=linesToHtml(lines.slice(1));
          sysOutEl.style.display='block';
        }
      }
      scrollToBottom();
    }
  });
}

// SYS_FENCE prefix: bridge.js prepends this to all diagnostic/shell output so
// it is always routed to a sys bubble regardless of current chatState.
const SYS_FENCE_PFX = '\x1b]9;sys-fence\x07';

// ── Public API ────────────────────────────────────────────────────────────────
window.termWrite=function(raw){
  // SYS_FENCE may appear anywhere in the chunk — TCP coalesces multiple socket.write()
  // calls into one segment. Split on SYS_FENCE_PFX so fenced content always routes to
  // the sys bubble regardless of chatState, even when interleaved with AI output.
  var fIdx=raw.indexOf(SYS_FENCE_PFX);
  if(fIdx>=0){
    if(fIdx>0) window.termWrite(raw.slice(0,fIdx)); // unfenced prefix via normal path
    var parts=raw.slice(fIdx).split(SYS_FENCE_PFX);
    for(var i=1;i<parts.length;i++){
      if(!parts[i]) continue;
      processAnsiBytes(sysAnsi,parts[i]);
      var ht=sysAnsi.lines.some(function(l){return l&&l.length>0;});
      if(ht){getSysBubble();scheduleSysRender();}
    }
    return;
  }
  if(chatState==='RESPONDING'){
    rawAiText+=raw;
    processAnsiBytes(currentAiAnsi,raw);
    // PTY/TUI mode: full-screen ANSI sequences (cursor home, erase screen, absolute
    // positioning) produce garbled chrome if rendered mid-stream. Skip intermediate
    // renders when TUI chrome is detected; finalizeAiBubble will extract clean text.
    var hasTuiChrome=/\x1b\[H|\x1b\[2J|\x1b\[\d+;\d+H/.test(raw);
    if(!hasTuiChrome) scheduleAiRender();
  } else {
    processAnsiBytes(sysAnsi,raw);
    var hasText=sysAnsi.lines.some(function(l){return l&&l.length>0;});
    if(hasText){getSysBubble();scheduleSysRender();}
  }
};

// ── Session HTML snapshots (save/restore rendered bubbles on tab switch) ──────
// Keyed by session ID (integer). Stores msgs.innerHTML so switching tabs
// restores the exact rendered conversation without replaying raw bytes.
const _sessionSnaps = new Map();

window.termClear=function(sid){
  stopThinkingTimer();
  msgs.innerHTML='';
  sysEl=null; sysOutEl=null;
  sysAnsi=makeAnsiState();
  currentAiBubble=null;
  currentAiAnsi=null;
  chatState='IDLE';
  thinkBub.style.display='none';
  document.body.appendChild(thinkBub);
  // Drop any saved snapshot so tab-switch-back doesn't restore stale content
  if(sid!=null) _sessionSnaps.delete(sid);
};

window.termSaveSnapshot = function(sid) {
  _sessionSnaps.set(sid, msgs.innerHTML);
};

// Returns true if snapshot existed and was restored, false if not found.
window.termRestoreSnapshot = function(sid) {
  if (!_sessionSnaps.has(sid)) return false;
  stopThinkingTimer();
  msgs.innerHTML = _sessionSnaps.get(sid);
  // M2: do NOT reset sysAnsi here — resetting mid-way while DOM already has
  // rendered content causes ANSI state/DOM mismatch and double-render bugs.
  // sysEl is cleared so next sys output creates a fresh bubble below restored content.
  sysEl=null; sysOutEl=null;
  currentAiBubble=null; currentAiAnsi=null;
  chatState='IDLE';
  thinkBub.style.display='none';
  document.body.appendChild(thinkBub);
  scrollToBottom();
  return true;
};

window.termDeleteSnapshot = function(sid) {

// ── Input buffer ──────────────────────────────────────────────────────────────
let inputBuffer='';

function updateInputDisp(){
  inputDisp.textContent=inputBuffer;
  scrollToBottom();

function submitLine(text){
  // Normalize BEFORE routing: strip zero-width chars and fullwidth punctuation so
  // that Android IME artifacts (invisible chars prepended by keyboard) don't cause
  // ! and $ commands to slip through to AI instead of the bridge.
  let msg=(text!==undefined?text:inputBuffer)
    .replace(/[\u200b\u200c\u200d\ufeff\u2060\u00ad\u2028\u2029]/g,'') // zero-width + soft-hyphen + line seps
    .replace(/！/g,'!')   // fullwidth ! → ASCII !
    .replace(/＄/g,'$')   // fullwidth $ → ASCII $
    .trim();
  if(/^!\s+/.test(msg)) msg='!'+msg.slice(1).trimStart(); // "! cmd" → "!cmd"
  inputBuffer='';
  ghost.value='';
  historyIdx=-1;
  savedInput='';
  updateInputDisp();
  if(!msg && !pendingImageAttached) return;
  // Local bridge commands (!log, !help, !clear, $ cmd, etc.): show a terminal
  // command bubble so the user sees what was typed, then send as raw input.
  // No thinking spinner, no AI bubble — bridge handles these directly.
  if(msg.startsWith('!')||msg.startsWith('$')){
    if(msg.length>0&&inputHistory[inputHistory.length-1]!==msg){
      inputHistory.push(msg);
      if(inputHistory.length>50) inputHistory.shift();
    }
    // All ! and $ commands run immediately regardless of busy state
    // Fresh sys bubble so bridge output appears below this cmd bubble
    sysEl=null; sysOutEl=null; sysAnsi=makeAnsiState();
    addCmdBubble(msg,false);
    // Normalize ! command verb to lowercase before sending — Android autocorrect
    // treats "!" as sentence-end and capitalizes the next character, breaking
    // bridge's command matching. Only lowercase the verb, not $ shell args.
    let toSend=msg;
    if(msg.startsWith('!')){
      const sp=msg.indexOf(' ');
      toSend=(sp===-1?msg:msg.slice(0,sp)).toLowerCase()+(sp===-1?'':msg.slice(sp));
    }
    if(typeof Android!=='undefined') Android.sendInput(toSend+'\r');
    return;
  }
  const displayMsg = msg || '📷';
  // Push to input history (skip duplicates of the last entry)
  if(msg.length>0&&inputHistory[inputHistory.length-1]!==msg){
    inputHistory.push(msg);
    if(inputHistory.length>50) inputHistory.shift();
  }
  resetToIdle(); // finalize any pending AI bubble and hide thinking animation
  sysEl=null; sysOutEl=null;
  sysAnsi=makeAnsiState();
  // Remove suggestions bar if present
  const sb=document.getElementById('suggestions-bar');if(sb)sb.remove();
  if(pendingImageAttached){
    const thumbUrl = pendingImageDataUrl;
    pendingImageAttached = false;
    pendingImageDataUrl  = null;
    _hideImgPreview();
    addUserBubble(displayMsg, thumbUrl);
    if(typeof Android!=='undefined') Android.submitMessageWithImage(msg);
  } else {
    addUserBubble(displayMsg);
    if(typeof Android!=='undefined') Android.submitMessage(msg);
  }
}

// Send inputBuffer (or empty string) directly to PTY without the chat-message
// path. This avoids addUserBubble + resetToIdle which cause misalignment when
// interacting with Claude Code's TUI menus (theme picker, prompts, etc.).
// The send button (→) still uses submitLine() for proper chat message behavior.
function sendRawInput(){
  // Strip zero-width Unicode chars that Android IME may prepend (same as submitLine)
  const text=inputBuffer.replace(/[\u200b-\u200f\u2028\u2029\u202a-\u202e\u2060-\u206f\ufeff\u00ad]/g,'').trim();
  inputBuffer='';ghost.value='';historyIdx=-1;savedInput='';
  updateInputDisp();
  if(text.length>0){
    if(inputHistory[inputHistory.length-1]!==text){
      inputHistory.push(text);if(inputHistory.length>50)inputHistory.shift();
    }
    // Normalize ! command verb to lowercase so keyboard-Enter path matches bridge
    // handlers the same way the Send button path does.
    let toSend=text;
    if(text.startsWith('!')){
      const sp=text.indexOf(' ');
      toSend=(sp===-1?text:text.slice(0,sp)).toLowerCase()+(sp===-1?'':text.slice(sp));
    }
    tbRaw(toSend+'\r');
  } else {
    tbRaw('\r');
  }
}
// M10: track whether the last input was a paste so we don't strip newlines from it.
var _ghostLastWasPaste = false;
ghost.addEventListener('paste', function(){
  _ghostLastWasPaste = true;
});
ghost.addEventListener('input',function(){
  const val=ghost.value;
  if(val.includes('\n')){
    if(_ghostLastWasPaste){
      // Paste: allow multi-line — keep newlines in the buffer, do not trigger send.
      _ghostLastWasPaste=false;
      inputBuffer=val;
      ghost.value=val;
      updateInputDisp();
      return;
    }
    // Enter key: strip the newline and send.
    ghost.value=val.replace(/\n/g,'');
    inputBuffer=ghost.value;
    updateInputDisp();
    sendRawInput();
    return;
  }
  _ghostLastWasPaste=false;
  inputBuffer=val;
  updateInputDisp();
});
ghost.addEventListener('keydown',function(e){
  // Ctrl modifier active — intercept next letter and fire Ctrl+letter combo
  if(ctrlMode && e.key.length===1){
    e.preventDefault();
    ctrlMode=false;
    ctrlBtn.classList.remove('tb-ctrl-active');
    const code=e.key.toLowerCase().charCodeAt(0)-96; // a=1…z=26
    if(code>=1&&code<=26) tbRaw(String.fromCharCode(code));
    return;
  }
  if(e.key==='Enter'){e.preventDefault();sendRawInput();}
  else if(e.key==='ArrowUp'){e.preventDefault();if(inputBuffer.length===0){tbRaw('\x1b[A');}else{historyUp();}}
  else if(e.key==='ArrowDown'){e.preventDefault();if(historyIdx===-1){tbRaw('\x1b[B');}else{historyDown();}}
  else if(e.key==='ArrowLeft'){e.preventDefault();tbRaw('\x1b[D');}
  else if(e.key==='ArrowRight'){e.preventDefault();tbRaw('\x1b[C');}
  else if(e.key==='Tab'){e.preventDefault();tbRaw('\t');}
  else if(e.key==='Escape'){e.preventDefault();tbRaw('\x1b');}
  else if(e.key==='Backspace'){
    if(inputBuffer.length>0){e.preventDefault();inputBuffer=inputBuffer.slice(0,-1);ghost.value=inputBuffer;updateInputDisp();}
    else{e.preventDefault();tbRaw('\x7f');}
  }
});

// ── Font size ─────────────────────────────────────────────────────────────────
// M9: parse, validate and clamp on load; NaN or out-of-range falls back to 14.
var termFontSize=Math.max(10,Math.min(22,parseInt(localStorage.getItem('termFontSize'))||14));
function applyFontSize(sz){
  termFontSize=Math.max(10,Math.min(22,sz));

// ── Terminal size reporting ────────────────────────────────────────────────────
// Measures the character grid and notifies Kotlin so bridge.js can forward
// accurate COLS/ROWS to libpty-helper.so via TIOCSWINSZ.
function reportTermSize(){
  var probe=document.createElement('span');
  probe.style.cssText='position:absolute;visibility:hidden;font-family:Space Mono,Courier New,monospace;font-size:'+termFontSize+'px;white-space:pre;';
  probe.textContent='X';
  document.body.appendChild(probe);
  var r=probe.getBoundingClientRect();
  var charW=r.width||8;
  var charH=r.height||termFontSize*1.5;
  document.body.removeChild(probe);
  var cols=Math.max(40,Math.floor(window.innerWidth/charW));
  var rows=Math.max(10,Math.floor(window.innerHeight/charH));
  // L20: wrap in try/catch — WebView bridge can throw if called before binding is ready.
  if(typeof Android!=='undefined'&&Android.notifyResize){
    try { Android.notifyResize(cols,rows); } catch(_) {}
  }
}

// ── MCP chip tap — show/hide tool popover ─────────────────────────────────────
document.getElementById('mcp-chip').addEventListener('click',function(){
  var pop=document.getElementById('mcp-popover');
  if(!pop) return;
  if(pop.style.display==='block'){pop.style.display='none';return;}
  var data=this._mcpData||[];
  var html='<div style="font-size:9px;color:rgba(0,200,100,0.6);letter-spacing:1px;margin-bottom:6px;">CONNECTED MCP SERVERS</div>';
  if(!data.length){html+='<div style="color:rgba(200,200,200,0.4);">None</div>';}
  for(var i=0;i<data.length;i++){
    var srv=data[i];
    var typeLabel=srv.type==='stdio'?'chat + agentic':'agentic only';
    html+='<div class="mcp-server-hd">● '+srv.name
      +' <span style="color:rgba(200,200,200,0.35);font-size:8px;">('+typeLabel+')</span></div>';
    if(srv.tools&&srv.tools.length){
      for(var j=0;j<srv.tools.length;j++){
        html+='<div class="mcp-tool-row">· '+srv.tools[j].name+'</div>';
      }
    }else{
      html+='<div class="mcp-tool-row" style="color:rgba(200,200,200,0.35);">(no tools)</div>';
    }
  }
  pop.innerHTML=html;
  pop.style.display='block';
});
document.addEventListener('click',function(e){
  var pop=document.getElementById('mcp-popover');
  var chip=document.getElementById('mcp-chip');
  if(pop&&pop.style.display==='block'&&!pop.contains(e.target)&&e.target!==chip){
    pop.style.display='none';
  }
});
