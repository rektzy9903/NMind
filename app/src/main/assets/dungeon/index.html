<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dungeon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0C0C0F; overflow: hidden; font-family: 'Courier New', monospace; }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 50;
  background: #0C0C0F; border-bottom: 1px solid #2A2A30;
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
#header-title { font-size: 15px; font-weight: 700; color: #F0F0F2; letter-spacing: 0.5px; }
#header-project { font-size: 11px; color: #9090A0; margin-left: auto; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#back-btn {
  width: 32px; height: 32px; border-radius: 8px; background: #151518;
  border: 1px solid #2A2A30; color: #9090A0; font-size: 16px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}

/* ── Canvas wrapper ── */
#canvas-wrap {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 56px;
  overflow: hidden; background: #111108;
}
#dungeon-canvas { display: block; cursor: grab; }
#dungeon-canvas:active { cursor: grabbing; }

/* ── Bottom toolbar ── */
#toolbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
  background: #0C0C0F; border-top: 1px solid #2A2A30;
  display: flex; align-items: center; justify-content: space-around; padding: 0 8px;
}
.tb-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 12px; border-radius: 10px; background: transparent;
  border: none; color: #9090A0; font-size: 9px; font-family: 'Courier New', monospace;
  cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
}
.tb-btn svg { width: 18px; height: 18px; }
.tb-btn.active { color: #E8834A; background: #22E8834A; }

/* ── Room panel (slide-in) ── */
#room-panel {
  position: fixed; top: 48px; right: 0; bottom: 56px; width: 280px;
  background: #151518; border-left: 1px solid #2A2A30;
  transform: translateX(100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column; z-index: 40; overflow: hidden;
}
#room-panel.open { transform: translateX(0); }
#panel-header {
  padding: 16px; border-bottom: 1px solid #2A2A30;
  display: flex; align-items: center; gap: 8px;
}
#panel-title { font-size: 14px; font-weight: 700; color: #F0F0F2; flex: 1; }
#panel-close {
  width: 28px; height: 28px; border-radius: 6px; background: #1E1E22;
  border: 1px solid #2A2A30; color: #9090A0; font-size: 16px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
#panel-content { flex: 1; overflow-y: auto; padding: 12px; }
#panel-content::-webkit-scrollbar { width: 3px; }
#panel-content::-webkit-scrollbar-thumb { background: #2A2A30; border-radius: 2px; }

.bug-item {
  background: #1E1E22; border: 1px solid #2A2A30; border-radius: 10px;
  padding: 10px 12px; margin-bottom: 8px;
}
.bug-item.critical { border-color: #F87171; }
.bug-item.major    { border-color: #FBBF24; }
.bug-item.minor    { border-color: #60606E; }
.bug-title { font-size: 12px; font-weight: 700; color: #F0F0F2; margin-bottom: 4px; }
.bug-meta  { font-size: 10px; color: #9090A0; }
.bug-sev   { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-right: 4px; }
.bug-sev.critical { background: #3FF87171; color: #F87171; }
.bug-sev.major    { background: #3FFBBF24; color: #FBBF24; }
.bug-sev.minor    { background: #22606060; color: #9090A0; }

.dispatch-btn {
  width: 100%; padding: 10px; border-radius: 10px; margin-top: 4px;
  background: #22E8834A; border: 1px solid #E8834A; color: #E8834A;
  font-size: 11px; font-weight: 700; font-family: 'Courier New', monospace;
  cursor: pointer; letter-spacing: 0.5px;
}
.dispatch-btn:active { background: #44E8834A; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1E1E22; border: 1px solid #2A2A30; border-radius: 10px;
  padding: 8px 16px; font-size: 12px; color: #F0F0F2;
  opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 99;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Loading state ── */
#loading {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 56px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; color: #9090A0; font-size: 13px;
}
#loading svg { width: 32px; height: 32px; opacity: 0.4; animation: spin 1.5s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="back-btn" onclick="history.back()">‹</div>
  <span id="header-title">🏰 Dungeon</span>
  <span id="header-project" id="project-label">No project</span>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
  <canvas id="dungeon-canvas"></canvas>
</div>

<!-- Loading -->
<div id="loading">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
  </svg>
  <span id="loading-text">Scanning project…</span>
</div>

<!-- Bottom toolbar -->
<div id="toolbar">
  <button class="tb-btn active" id="btn-map" onclick="setView('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    Map
  </button>
  <button class="tb-btn" id="btn-agents" onclick="setView('agents')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      <path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
    </svg>
    Heroes
  </button>
  <button class="tb-btn" id="btn-scout" onclick="runScout()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    Scout
  </button>
  <button class="tb-btn" id="btn-bugs" onclick="setView('bugs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M8 2v2a4 4 0 0 0 8 0V2"/><path d="M12 12v4"/>
      <path d="M8 12H4a8 8 0 0 0 16 0h-4"/><path d="M12 8a4 4 0 0 0-4 4"/>
      <path d="M16 12a4 4 0 0 0-4-4"/>
    </svg>
    Bugs
  </button>
</div>

<!-- Room panel -->
<div id="room-panel">
  <div id="panel-header">
    <span id="panel-title">Room</span>
    <div id="panel-close" onclick="closePanel()">×</div>
  </div>
  <div id="panel-content" id="panel-body"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
(function(){
'use strict';

// ── Bridge ──────────────────────────────────────────────────────────────────
const A = (typeof DungeonAndroid !== 'undefined') ? DungeonAndroid : null;
function readFile(p)  { return A ? (A.readFile(p)||'') : ''; }
function writeFile(p,c){ return A ? A.writeFile(p,c) : false; }
function listDir(p)   { try { return JSON.parse(A ? A.listDir(p) : '[]'); } catch(_){ return []; } }
function getAgents()  { try { return JSON.parse(A ? A.getAgents() : '[]'); } catch(_){ return []; } }
function getProjectPath(){ return A ? (A.getProjectPath()||'') : ''; }
function spawnAgent(name,cwd,task){ return A ? A.spawnAgent(name,cwd,task) : 'no-bridge'; }

// ── State ────────────────────────────────────────────────────────────────────
var projectPath = '';
var rooms = [];         // [{id, name, type, path, parentId, bugs[], x, y, w, h}]
var agents = [];        // from ~/.claude/agents/*.md
var selectedRoom = null;
var view = 'map';
var panOffset = {x:0, y:0};
var panStart = null;
var scale = 1;

// ── Canvas setup ─────────────────────────────────────────────────────────────
var wrap = document.getElementById('canvas-wrap');
var canvas = document.getElementById('dungeon-canvas');
var ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}
window.addEventListener('resize', resizeCanvas);

// ── Init ─────────────────────────────────────────────────────────────────────
function init(){
  projectPath = getProjectPath();
  var lbl = document.getElementById('project-label');
  if(lbl) lbl.textContent = projectPath ? projectPath.split('/').pop() : 'No project';

  if(!projectPath){ showLoading(false); showToast('No project selected — open Settings to set one'); return; }

  agents = getAgents();
  buildRooms();
  showLoading(false);
  resizeCanvas();
  draw();
}

// ── Room building (scan folder tree) ─────────────────────────────────────────
function buildRooms(){
  rooms = [];
  var cw = canvas.width  || wrap.clientWidth  || 360;
  var ch = canvas.height || wrap.clientHeight || 600;

  // Throne Room = project root
  rooms.push({
    id: 'throne', name: 'Throne Room', type: 'throne',
    path: projectPath, parentId: null,
    bugs: parseBugs(projectPath + '/library.md'),
    x: cw/2 - 60, y: ch/2 - 50, w: 120, h: 80,
  });

  // Top-level folders = main rooms
  var entries = listDir(projectPath).filter(function(e){ return e.isDir && !e.name.startsWith('.'); });
  var count = entries.length;
  var radius = Math.min(cw, ch) * 0.32;
  entries.forEach(function(e, i){
    var angle = (i / count) * Math.PI * 2 - Math.PI / 2;
    var cx = cw/2 + Math.cos(angle) * radius;
    var cy = ch/2 + Math.sin(angle) * radius;
    var roomPath = projectPath + '/' + e.name;
    rooms.push({
      id: e.name, name: e.name, type: 'feature',
      path: roomPath, parentId: 'throne',
      bugs: parseBugs(roomPath + '/library.md'),
      x: cx - 55, y: cy - 35, w: 110, h: 60,
    });
  });
}

// ── library.md bug parser ─────────────────────────────────────────────────────
function parseBugs(libPath){
  var text = readFile(libPath);
  if(!text) return [];
  var bugs = [];
  var inSection = false;
  text.split('\n').forEach(function(line){
    if(/^##\s+🐛\s+Open Bugs/i.test(line)){ inSection = true; return; }
    if(/^##\s+/.test(line) && inSection){ inSection = false; }
    if(!inSection) return;
    // Format: - [ ] **title** · `file:line` · severity · ...
    var m = line.match(/^-\s+\[\s+\]\s+\*\*(.+?)\*\*\s*(?:·\s*`?([^`·]+)`?)?\s*(?:·\s*(critical|major|minor))?/i);
    if(m){
      bugs.push({
        title: m[1].trim(),
        file:  (m[2]||'').trim(),
        sev:   (m[3]||'minor').toLowerCase(),
        raw:   line,
      });
    }
  });
  return bugs;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
var PARCHMENT = '#1A180F';
var PARCHMENT2 = '#221E10';
var INK = '#5C5030';
var INK2 = '#8B7540';
var AMBER = '#E8834A';
var RED = '#F87171';
var GREEN = '#3DD68C';
var TEXT = '#D4C49A';
var TEXT2 = '#8B7540';

function draw(){
  if(view !== 'map'){ drawListView(); return; }

  ctx.fillStyle = '#111108';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Parchment vignette
  var grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, Math.max(canvas.width,canvas.height)*0.7);
  grad.addColorStop(0, 'rgba(30,26,12,0.0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(panOffset.x, panOffset.y);
  ctx.scale(scale, scale);

  // Draw corridors first (behind rooms)
  rooms.forEach(function(r){
    if(!r.parentId) return;
    var parent = rooms.find(function(p){ return p.id === r.parentId; });
    if(!parent) return;
    drawCorridor(
      parent.x + parent.w/2, parent.y + parent.h/2,
      r.x + r.w/2, r.y + r.h/2
    );
  });

  // Draw rooms
  rooms.forEach(function(r){ drawRoom(r); });

  ctx.restore();
}

function drawCorridor(x1,y1,x2,y2){
  ctx.save();
  ctx.strokeStyle = INK;
  ctx.lineWidth = 2;
  ctx.setLineDash([5,4]);
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.stroke();
  ctx.restore();
}

function drawRoom(r){
  var hasBugs = r.bugs.length > 0;
  var isThrone = r.type === 'throne';
  var isSelected = selectedRoom && selectedRoom.id === r.id;

  ctx.save();

  // Parchment fill
  var bg = isThrone ? PARCHMENT2 : PARCHMENT;
  if(hasBugs) bg = '#1F110C';
  ctx.fillStyle = bg;
  roundRect(ctx, r.x, r.y, r.w, r.h, 8);
  ctx.fill();

  // Border
  ctx.strokeStyle = isSelected ? AMBER : (hasBugs ? '#5C2010' : INK);
  ctx.lineWidth = isSelected ? 2 : 1.5;
  if(isThrone){ ctx.strokeStyle = isSelected ? AMBER : INK2; ctx.lineWidth = 2; }
  roundRect(ctx, r.x, r.y, r.w, r.h, 8);
  ctx.stroke();

  // Room name
  ctx.fillStyle = isThrone ? INK2 : TEXT;
  ctx.font = (isThrone ? 'bold ' : '') + '11px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var label = r.name.length > 14 ? r.name.slice(0,13)+'…' : r.name;
  ctx.fillText(label, r.x + r.w/2, r.y + r.h/2 - (hasBugs ? 8 : 0));

  // Bug count badge
  if(hasBugs){
    var hasCritical = r.bugs.some(function(b){ return b.sev === 'critical'; });
    var hasMajor    = r.bugs.some(function(b){ return b.sev === 'major'; });
    var badgeColor = hasCritical ? '#F87171' : (hasMajor ? '#FBBF24' : '#9090A0');
    ctx.fillStyle = badgeColor;
    ctx.font = '10px "Courier New", monospace';
    ctx.fillText('🐛 ' + r.bugs.length + (r.bugs.length===1?' monster':' monsters'), r.x+r.w/2, r.y+r.h/2+9);
  }

  // Throne crown indicator
  if(isThrone){
    ctx.fillStyle = INK2;
    ctx.font = '14px serif';
    ctx.fillText('♛', r.x+r.w/2, r.y+14);
  }

  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── List views (Heroes / Bugs) ────────────────────────────────────────────────
function drawListView(){
  // These are rendered in the panel / DOM, not canvas — just blank canvas
  ctx.fillStyle = '#0C0C0F';
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ── Pan & tap ─────────────────────────────────────────────────────────────────
var tapStart = null;
canvas.addEventListener('touchstart', function(e){
  if(e.touches.length===1){
    panStart = {x: e.touches[0].clientX - panOffset.x, y: e.touches[0].clientY - panOffset.y};
    tapStart = {x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now()};
  }
}, {passive:true});

canvas.addEventListener('touchmove', function(e){
  if(e.touches.length===1 && panStart){
    panOffset.x = e.touches[0].clientX - panStart.x;
    panOffset.y = e.touches[0].clientY - panStart.y;
    draw();
  }
}, {passive:true});

canvas.addEventListener('touchend', function(e){
  if(tapStart && Date.now()-tapStart.t < 300){
    var dx = e.changedTouches[0].clientX - tapStart.x;
    var dy = e.changedTouches[0].clientY - tapStart.y;
    if(Math.abs(dx)<8 && Math.abs(dy)<8){
      handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }
  }
  tapStart = null; panStart = null;
}, {passive:true});

// Mouse fallback (for dev/desktop testing)
canvas.addEventListener('mousedown', function(e){
  panStart = {x: e.clientX - panOffset.x, y: e.clientY - panOffset.y};
  tapStart = {x: e.clientX, y: e.clientY, t: Date.now()};
});
canvas.addEventListener('mousemove', function(e){
  if(panStart && (e.buttons&1)){
    panOffset.x = e.clientX - panStart.x;
    panOffset.y = e.clientY - panStart.y;
    draw();
  }
});
canvas.addEventListener('mouseup', function(e){
  if(tapStart && Date.now()-tapStart.t < 300){
    var dx = e.clientX-tapStart.x, dy = e.clientY-tapStart.y;
    if(Math.abs(dx)<5 && Math.abs(dy)<5) handleTap(e.clientX, e.clientY);
  }
  panStart=null; tapStart=null;
});

function handleTap(cx,cy){
  if(view!=='map') return;
  // Convert screen → canvas coords
  var rect = canvas.getBoundingClientRect();
  var wx = (cx - rect.left - panOffset.x) / scale;
  var wy = (cy - rect.top  - panOffset.y) / scale;
  var hit = rooms.find(function(r){ return wx>=r.x && wx<=r.x+r.w && wy>=r.y && wy<=r.y+r.h; });
  if(hit){ selectedRoom = hit; openPanel(hit); draw(); }
  else   { selectedRoom = null; closePanel(); draw(); }
}

// ── Panel ─────────────────────────────────────────────────────────────────────
function openPanel(room){
  var panel = document.getElementById('room-panel');
  document.getElementById('panel-title').textContent = room.name;
  var body = document.getElementById('panel-content');
  body.innerHTML = '';

  if(room.bugs.length === 0){
    body.innerHTML = '<p style="color:#60606E;font-size:12px;text-align:center;padding:24px 0;">No monsters here.<br>This room is clean ✅</p>';
  } else {
    room.bugs.forEach(function(bug){
      var div = document.createElement('div');
      div.className = 'bug-item ' + bug.sev;
      div.innerHTML =
        '<div class="bug-title">' + esc(bug.title) + '</div>' +
        '<div class="bug-meta">' +
          '<span class="bug-sev ' + bug.sev + '">' + bug.sev.toUpperCase() + '</span>' +
          (bug.file ? '<code style="font-size:10px;color:#9090A0;">' + esc(bug.file) + '</code>' : '') +
        '</div>';
      body.appendChild(div);

      if(agents.length > 0){
        var btn = document.createElement('button');
        btn.className = 'dispatch-btn';
        btn.textContent = '⚔ Dispatch ' + agents[0].name + ' to fix';
        btn.onclick = (function(b, r){ return function(){ dispatchHero(agents[0], r, b); }; })(bug, room);
        body.appendChild(btn);
      }
    });
  }

  // Sub-rooms section
  var subs = rooms.filter(function(r){ return r.parentId === room.id; });
  if(subs.length){
    var hdr = document.createElement('p');
    hdr.style.cssText = 'color:#9090A0;font-size:10px;letter-spacing:1px;margin:16px 0 8px;text-transform:uppercase;';
    hdr.textContent = 'Sub-rooms';
    body.appendChild(hdr);
    subs.forEach(function(s){
      var row = document.createElement('div');
      row.style.cssText = 'padding:8px 10px;background:#1E1E22;border:1px solid #2A2A30;border-radius:8px;margin-bottom:6px;cursor:pointer;';
      row.innerHTML = '<span style="font-size:12px;color:#F0F0F2;">' + esc(s.name) + '</span>' +
        (s.bugs.length ? '<span style="float:right;font-size:10px;color:#F87171;">🐛 ' + s.bugs.length + '</span>' : '<span style="float:right;font-size:10px;color:#3DD68C;">✅</span>');
      row.onclick = function(){ selectedRoom=s; openPanel(s); draw(); };
      body.appendChild(row);
    });
  }

  panel.classList.add('open');
}

function closePanel(){
  document.getElementById('room-panel').classList.remove('open');
}

// ── Dispatch ──────────────────────────────────────────────────────────────────
function dispatchHero(agent, room, bug){
  var task = [
    'You have been dispatched to fix a bug in this room.',
    '',
    'Bug: **' + bug.title + '**',
    bug.file ? 'File: ' + bug.file : '',
    'Severity: ' + bug.sev,
    '',
    'Your task:',
    '1. Read library.md in this folder to understand the room context',
    '2. Read and fix the file at ' + (bug.file || 'the location described above'),
    '3. Update library.md — move the bug from ## 🐛 Open Bugs to ## ✅ Resolved',
    '4. Update the parent room\'s library.md receptionist line to reflect this room is cleaner',
  ].filter(Boolean).join('\n');

  var sid = spawnAgent(agent.name, room.path, task);
  showToast('⚔ ' + agent.name + ' dispatched to ' + room.name);
  closePanel();
}

// ── View switching ────────────────────────────────────────────────────────────
function setView(v){
  view = v;
  ['map','agents','scout','bugs'].forEach(function(id){
    var btn = document.getElementById('btn-'+id);
    if(btn) btn.classList.toggle('active', id===v);
  });
  if(v==='agents') showAgentsPanel();
  else if(v==='bugs') showAllBugs();
  else draw();
}

function showAgentsPanel(){
  draw();
  if(!agents.length){
    showToast('No heroes found — create agents in ~/.claude/agents/');
    return;
  }
  var panel = document.getElementById('room-panel');
  document.getElementById('panel-title').textContent = '⚔ Heroes';
  var body = document.getElementById('panel-content');
  body.innerHTML = '';
  agents.forEach(function(a){
    var div = document.createElement('div');
    div.style.cssText = 'background:#1E1E22;border:1px solid #2A2A30;border-radius:10px;padding:10px 12px;margin-bottom:8px;';
    div.innerHTML =
      '<div style="font-size:12px;font-weight:700;color:#F0F0F2;">' + esc(a.name) + '</div>' +
      (a.description ? '<div style="font-size:10px;color:#9090A0;margin-top:3px;">' + esc(a.description) + '</div>' : '') +
      (a.model ? '<div style="font-size:10px;color:#60A5FA;margin-top:3px;">model: ' + esc(a.model) + '</div>' : '');
    body.appendChild(div);
  });
  panel.classList.add('open');
}

function showAllBugs(){
  draw();
  var allBugs = [];
  rooms.forEach(function(r){ r.bugs.forEach(function(b){ allBugs.push({room:r, bug:b}); }); });
  var panel = document.getElementById('room-panel');
  document.getElementById('panel-title').textContent = '🐛 All Bugs (' + allBugs.length + ')';
  var body = document.getElementById('panel-content');
  body.innerHTML = '';
  if(!allBugs.length){
    body.innerHTML = '<p style="color:#3DD68C;font-size:12px;text-align:center;padding:24px 0;">Dungeon is clear! ✅<br>No monsters found.</p>';
  } else {
    allBugs.forEach(function(item){
      var div = document.createElement('div');
      div.className = 'bug-item ' + item.bug.sev;
      div.innerHTML =
        '<div class="bug-title">' + esc(item.bug.title) + '</div>' +
        '<div class="bug-meta" style="margin-top:3px;">' +
          '<span class="bug-sev ' + item.bug.sev + '">' + item.bug.sev.toUpperCase() + '</span>' +
          '<span style="color:#9090A0;">in ' + esc(item.room.name) + '</span>' +
        '</div>';
      body.appendChild(div);
    });
  }
  panel.classList.add('open');
}

function runScout(){
  showToast('Scout coming in P2 — use /code-review in the terminal for now');
  setView('map');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function showLoading(show){
  document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
showLoading(true);
setTimeout(init, 80);  // let the DOM paint first

})();
</script>
</body>
</html>
