name: Interactive PTY Session Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-pty:
    name: Test PTY auth bypass + proxy response
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # node-pty needs native build tools
      - name: Install build tools for node-pty
        run: sudo apt-get install -y python3 make g++ libx11-dev

      - name: Run interactive PTY session test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_TEST_KEY }}
        run: node .github/scripts/test-pty-session.js
