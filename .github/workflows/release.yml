name: Release APK

on:
  # Trigger when you push a version tag like v1.0.0
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release Signed APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew && chmod +x scripts/build-llamaserver.sh

      # ── Build llama-server for Android ARM64 ─────────────────────────────────
      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: .llama-cache
          key: llamacpp-b5188-arm64-${{ runner.os }}
          restore-keys: llamacpp-b5188-arm64-

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Build llama-server
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393
          # Install NDK version if not already present
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
            echo "y" | sdkmanager "ndk;25.1.8937393"
          fi
          ./scripts/build-llamaserver.sh

      # ── Decode keystore from GitHub Secret ───────────────────────────────────
      # To set this up:
      #   1. Generate a keystore: keytool -genkey -v -keystore release.jks
      #      -alias claudecode -keyalg RSA -keysize 2048 -validity 10000
      #   2. Base64 encode it:   base64 -i release.jks | pbcopy   (Mac)
      #                          base64 release.jks | xclip        (Linux)
      #   3. In GitHub → Settings → Secrets → Actions, add:
      #      KEYSTORE_BASE64       = the base64 string
      #      KEYSTORE_PASSWORD     = your storePassword
      #      KEY_ALIAS             = claudecode
      #      KEY_PASSWORD          = your keyPassword
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Write signing config into local.properties
        run: |
          echo "KEYSTORE_FILE=../../release.jks"   >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                 >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"           >> local.properties

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Show build info
        run: |
          APK=app/build/outputs/apk/release/NexusMind-release.apk
          AAB=app/build/outputs/bundle/release/app-release.aab
          echo "✅ Signed APK: $(du -sh $APK | cut -f1)"
          echo "✅ Signed AAB: $(du -sh $AAB | cut -f1)"

      # ── Upload to GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/NexusMind-release.apk
            app/build/outputs/bundle/release/app-release.aab
          name: NexusMind ${{ github.ref_name }}
          body: |
            ## NexusMind ${{ github.ref_name }}

            ### Install
            1. Download `NexusMind-release.apk` below
            2. Enable **Install unknown apps** in Android Settings
            3. Open the APK and tap Install
            4. Follow the on-screen setup (WiFi recommended, ~500 MB first-time download)

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Also upload as artifacts for easy download ───────────────────────────
      - name: Upload signed APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusMind-${{ github.ref_name }}-apk
          path: app/build/outputs/apk/release/NexusMind-release.apk
          retention-days: 90

      - name: Upload signed AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusMind-${{ github.ref_name }}-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Clean up signing artifacts
        if: always()
        run: |
          rm -f local.properties
          rm -f release.jks
