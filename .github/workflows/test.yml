name: Bridge & Provider Tests

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Simulate bridge + test provider endpoints
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run bridge & provider simulation
        run: node .github/scripts/test-bridge.js
