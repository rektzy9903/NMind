name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache libnode.so (57 MB per ABI — cache to avoid repeated download)
      - name: Cache nodejs-mobile native libraries
        id: cache-libnode
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: nodejs-mobile-v18.20.4

      # ── 4. Download libnode.so from official nodejs-mobile release ───────────
      - name: Download nodejs-mobile native libraries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        run: |
          curl -fL \
            "https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-android.zip" \
            -o /tmp/nodejs-mobile.zip
          mkdir -p \
            app/src/main/jniLibs/arm64-v8a \
            app/src/main/jniLibs/armeabi-v7a
          unzip -p /tmp/nodejs-mobile.zip bin/arm64-v8a/libnode.so \
            > app/src/main/jniLibs/arm64-v8a/libnode.so
          unzip -p /tmp/nodejs-mobile.zip bin/armeabi-v7a/libnode.so \
            > app/src/main/jniLibs/armeabi-v7a/libnode.so
          echo "libnode.so sizes:"
          du -sh app/src/main/jniLibs/*/libnode.so

      # ── 4b. Download + repackage proot (Ubuntu engine, P1) ───────────────────
      # The Ubuntu engine (ubuntu-engine.md) runs latest claude-code inside a
      # proot rootfs. proot must live in nativeLibDir (the only exec-capable path
      # on Android 10+; /data is noexec) and be named lib*.so (Android only
      # extracts /^lib.*\.so$/ from the APK). We reuse UserLAnd's PROVEN Android
      # 10+ (.a10) proot build — it's dynamically linked against libtalloc.so.2,
      # so we ship libtalloc too and patchelf the one NEEDED entry to libtalloc.so
      # (no ".so.2" file would ever extract). The loaders are static ELFs that
      # proot injects via ptrace (read, not exec) → they just need to be present.
      #   proot.a10        → libproot.so          (the proot binary, dynamic PIE)
      #   loader.a10       → libproot-loader.so    (static; PROOT_LOADER points here)
      #   loader32.a10     → libproot-loader32.so  (static; PROOT_LOADER_32)
      #   libtalloc.so.2.a10 → libtalloc.so        (proot's only non-system dep)
      # proot.js sets PROOT_LOADER/PROOT_LOADER_32 + LD_LIBRARY_PATH=nativeDir.
      - name: Download + repackage proot (UserLAnd assets)
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq patchelf
          UL=v1.5.1
          BASE="https://github.com/CypherpunkArmory/UserLAnd-Assets-Support/releases/download/${UL}"

          repackage_abi() {  # $1 = abi-zip-name   $2 = jniLibs abi dir
            local zip="$1" abi="$2" tmp
            tmp="$(mktemp -d)"
            echo "── $abi: fetching $zip"
            curl -fL --retry 3 "${BASE}/${zip}" -o "$tmp/assets.zip"
            # Prefer the Android-10+ (.a10) variants; fall back to plain if absent.
            for f in proot loader loader32 libtalloc.so.2; do
              if unzip -o -q "$tmp/assets.zip" "${f}.a10" -d "$tmp" 2>/dev/null; then
                mv "$tmp/${f}.a10" "$tmp/${f}"
              else
                unzip -o -q "$tmp/assets.zip" "${f}" -d "$tmp"
              fi
            done
            mkdir -p "app/src/main/jniLibs/$abi"
            # proot links libtalloc.so.2 → rename dep to a real .so filename, and
            # set RPATH=$ORIGIN so libtalloc.so resolves next to the binary even
            # when launched without LD_LIBRARY_PATH (e.g. the manual `$` probe).
            patchelf --replace-needed libtalloc.so.2 libtalloc.so "$tmp/proot"
            patchelf --set-rpath '$ORIGIN' "$tmp/proot"
            cp "$tmp/proot"          "app/src/main/jniLibs/$abi/libproot.so"
            cp "$tmp/loader"         "app/src/main/jniLibs/$abi/libproot-loader.so"
            cp "$tmp/loader32"       "app/src/main/jniLibs/$abi/libproot-loader32.so"
            cp "$tmp/libtalloc.so.2" "app/src/main/jniLibs/$abi/libtalloc.so"
            rm -rf "$tmp"
          }

          repackage_abi "arm64-v8a-assets.zip"   "arm64-v8a"
          repackage_abi "armeabi-v7a-assets.zip" "armeabi-v7a"

          echo "── proot payload packaged:"
          ls -la app/src/main/jniLibs/*/libproot*.so app/src/main/jniLibs/*/libtalloc.so
          echo "── arm64 libproot.so NEEDED (libtalloc.so.2 must be GONE):"
          patchelf --print-needed app/src/main/jniLibs/arm64-v8a/libproot.so

      # ── 5. Cache Gradle packages ─────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      # ── 6. Make scripts executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew && chmod +x scripts/build-llamaserver.sh

      # ── 7. Install NDK ───────────────────────────────────────────────────────
      - name: Install NDK 25.1.8937393
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"

      # ── 8. Build llama-server for Android ARM64 ─────────────────────────────
      - name: Cache llama-server binary
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: .llama-cache
          key: llama-server-b5188-arm64-v2

      - name: Build llama-server
        run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393
          ./scripts/build-llamaserver.sh

      # ── 9. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 9. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusMind-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/NexusMind-debug.apk
          retention-days: 3
          if-no-files-found: error

      # ── 10. Show APK info ────────────────────────────────────────────────────
      - name: Show APK info
        run: |
          APK=app/build/outputs/apk/debug/NexusMind-debug.apk
          echo "Build successful"
          echo "APK size: $(du -sh "$APK" | cut -f1)"
          echo "Path: $APK"

      # ── 11. Push APK to Appetize.io (browser emulator) ───────────────────────
      # Appetize runs a PREBUILT APK; it cannot pull from CI, so we push it via
      # the REST API. Token is hardcoded below by owner choice (free-trial token,
      # exposure waived). Optional repo VARIABLE APPETIZE_PUBLIC_KEY: when set, we
      # UPDATE that same app so the test URL stays stable; when empty, we CREATE a
      # new app and print its publicKey to save.
      - name: Upload APK to Appetize
        env:
          APPETIZE_API_TOKEN:  tok_sbpkqmqqbvb46opko5x2kavsnq
          APPETIZE_PUBLIC_KEY: ${{ vars.APPETIZE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          APK=app/build/outputs/apk/debug/NexusMind-debug.apk

          if [ -z "${APPETIZE_API_TOKEN:-}" ]; then
            echo "::notice::APPETIZE_API_TOKEN not set — skipping Appetize upload."
            echo "Add it under Settings → Secrets and variables → Actions to enable."
            exit 0
          fi

          if [ -n "${APPETIZE_PUBLIC_KEY:-}" ]; then
            echo "Updating existing Appetize app ($APPETIZE_PUBLIC_KEY) — URL stays the same"
            ENDPOINT="https://${APPETIZE_API_TOKEN}@api.appetize.io/v1/apps/${APPETIZE_PUBLIC_KEY}"
          else
            echo "Creating a NEW Appetize app (no APPETIZE_PUBLIC_KEY set yet)"
            ENDPOINT="https://${APPETIZE_API_TOKEN}@api.appetize.io/v1/apps"
          fi

          RESP=$(curl -sS --fail-with-body "$ENDPOINT" \
                   -F "file=@${APK}" \
                   -F "platform=android")

          PUB=$(echo "$RESP" | jq -r '.publicKey // empty')
          URL=$(echo "$RESP" | jq -r '.publicURL // .appURL // empty')

          {
            echo "### 📱 Appetize build ready"
            echo ""
            echo "- **Test link:** ${URL:-<see raw response>}"
            echo "- **publicKey:** \`${PUB:-?}\`"
            if [ -z "${APPETIZE_PUBLIC_KEY:-}" ]; then
              echo ""
              echo "> ⚠️ First upload — save \`$PUB\` as repo **variable** \`APPETIZE_PUBLIC_KEY\`"
              echo "> (Settings → Secrets and variables → Actions → Variables) so future pushes"
              echo "> update the SAME app and the test URL stops changing."
            fi
            echo ""
            echo "> ℹ️ ABI note: this APK ships **arm64/armv7 only** (no x86). If Appetize's device"
            echo "> is x86_64, the UI loads but the Node bridge (libnode.so) won't — pick an ARM"
            echo "> device, or treat a real phone as ground truth for engine testing."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Appetize upload OK — publicKey=$PUB url=$URL"
