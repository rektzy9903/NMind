name: Full Session Simulation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/scripts/test-full-session.js'
      - 'app/src/main/assets/nodejs-project/bridge.js'

jobs:
  full-session:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ secrets.OPENROUTER_TEST_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run full Claude Code session simulation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_TEST_KEY }}
        run: node .github/scripts/test-full-session.js
