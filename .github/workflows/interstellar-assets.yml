name: Interstellar Assets

# Packages the optimized 3D/voice asset set (interstellar-assets/) into a
# downloadable artifact. The app pulls this on first open of Interstellar Audit
# and unpacks it to device storage — the assets are NEVER bundled in the APK.
#
# Artifact root layout (what the app unpacks):
#   assets/opt/*.glb  assets/textures/*  assets/three/*  assets/draco/*  voice/*.mp3

on:
  workflow_dispatch:
  push:
    branches: [ feat/glass-ui ]
    paths:
      - 'interstellar-assets/**'
      - '.github/workflows/interstellar-assets.yml'

jobs:
  package:
    name: Package Interstellar assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanity-check asset payload
        run: |
          echo "GLB models: $(ls interstellar-assets/assets/opt/*.glb | wc -l)"
          echo "Textures:   $(ls interstellar-assets/assets/textures | wc -l)"
          echo "Voice clips: $(ls interstellar-assets/voice/*.mp3 | wc -l)"
          du -sh interstellar-assets

      # upload-artifact@v4 stores files relative to interstellar-assets/, so the
      # artifact root is assets/ + voice/ directly (no wrapper dir).
      - name: Upload asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: interstellar-assets
          path: interstellar-assets/
          retention-days: 90
          compression-level: 0   # glb/jpg/mp3 are already compressed — skip re-deflate
